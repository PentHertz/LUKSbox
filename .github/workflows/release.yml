# Cross-platform release builds.
#
# Triggers on tags `v*` (e.g. `v0.1.0`), builds CLI + GUI for Linux,
# Windows, macOS Intel, macOS Apple Silicon, then publishes a GitHub
# Release with all four artifacts attached.
#
# Manual run: Actions tab -> Release -> "Run workflow" (won't publish a
# release; just builds artifacts you can download from the run page).
#
# System deps:
#   - Linux:   libfido2-dev + libfuse3-dev (apt). luksbox-fido2 +
#              luksbox-mount link them via pkg-config at build time.
#   - macOS:   libfido2 + macFUSE (Homebrew + cask). Same pkg-config
#              path as Linux.
#   - Windows: NO libfido2. We talk to FIDO2 via webauthn.dll directly
#              (see crates/luksbox-fido2/src/webauthn.rs); webauthn.dll
#              is a system DLL on every supported Windows. WinFsp is
#              still needed for the mount subcommand.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write       # to create the release + upload assets
  # The two scopes below enable GitHub Artifact Attestations
  # (Sigstore-backed). actions/attest-build-provenance asks for an
  # OIDC token from GitHub (`id-token: write`) so it can prove the
  # signing call came from this workflow run, then registers the
  # attestation against the artifact (`attestations: write`).
  # Anyone can verify with `gh attestation verify <artifact>
  # --owner penthertz`. No keys to manage on our side; signing
  # identity is short-lived per run and pinned to the commit SHA.
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: ${{ matrix.target }}${{ matrix.ubuntu_codename && format(' ({0})', matrix.ubuntu_codename) || '' }}
    runs-on: ${{ matrix.runner }}
    # Per-matrix container: most entries run on the host runner
    # (container is null / unset). The Trixie entries set
    # `container: debian:trixie` which moves the entire job inside a
    # fresh Debian 13 container so cargo-deb's `$auto` ELF-derived
    # dependencies pin trixie-correct package names instead of
    # noble-shaped ones (libfuse3-4 vs libfuse3-3, etc.). The
    # bootstrap step below installs the minimum tooling a
    # `debian:trixie` base image lacks (git for checkout, curl + ca-
    # certificates for rustup, build-essential for native deps).
    container: ${{ matrix.container || null }}
    strategy:
      fail-fast: false
      matrix:
        # ----------------------------------------------------------------
        # Linux is matrixed twice along an extra `ubuntu_codename`
        # dimension (jammy vs noble). cargo-deb's `$auto`-derived
        # `Depends:` line bakes in the BUILD HOST's package names with
        # `>=` minimums (e.g. `libtss2-mu0 (>= 3.0.1)` on jammy vs
        # `libtss2-mu-4.0.1-0t64 (>= 3.0.1)` on noble after the t64
        # transition). A jammy-built .deb refuses to install on noble
        # because `libtss2-mu0` no longer exists there, and vice versa.
        # We ship one .deb per release so users pick the matching
        # codename for their distro.
        #
        # The .rpm uses SONAMEs (e.g. `libtss2-mu.so.0()(64bit)`) which
        # are version-constraint-free and stable across Fedora/RHEL
        # releases. We build it only on jammy (one per arch); no need
        # for a noble variant.
        # ----------------------------------------------------------------
        include:
          # Linux x86_64 - Ubuntu 22.04 (jammy). Covers Ubuntu 22.04 +
          # Debian 11/12 (bullseye/bookworm) + Mint 21.x + most
          # downstream derivatives that haven't transitioned to t64.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            ubuntu_codename: jammy
            build_rpm: true
            archive: luksbox-${{ github.ref_name }}-x86_64-linux-jammy.tar.gz
          # Linux aarch64 - Ubuntu 22.04 (jammy). Native ARM64 GitHub-
          # hosted runner. GA for public repos since 2024 and private
          # repos since 2025; charged at the same minute rate as
          # x86_64. If your account/org doesn't have ARM64 runner
          # access, swap for `ubuntu-22.04` and add the cross-toolchain
          # steps in scripts/build_release.sh.
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            ubuntu_codename: jammy
            build_rpm: true
            archive: luksbox-${{ github.ref_name }}-aarch64-linux-jammy.tar.gz
          # Linux x86_64 - Ubuntu 24.04 (noble). Covers Ubuntu 24.04+
          # where the t64 transition renamed libssl3 -> libssl3t64,
          # libfido2-1 -> libfido2-1t64, libtss2-* -> libtss2-*-0t64.
          # Debian 13 (trixie) is handled by the dedicated trixie
          # matrix entries below (containerised build) because trixie
          # bumped libfuse3 from SONAME libfuse3.so.3 (`libfuse3-3`)
          # to libfuse3.so.4 (`libfuse3-4`), which cargo-deb's
          # `$auto` pins exactly per build host.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            ubuntu_codename: noble
            build_rpm: false
            archive: luksbox-${{ github.ref_name }}-x86_64-linux-noble.tar.gz
          # Linux aarch64 - Ubuntu 24.04 (noble). Native ARM64 noble
          # runner; GA on GitHub since late 2024.
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            ubuntu_codename: noble
            build_rpm: false
            archive: luksbox-${{ github.ref_name }}-aarch64-linux-noble.tar.gz
          # Linux x86_64 - Debian 13 (trixie). Built INSIDE a
          # `debian:trixie` Docker container on the Ubuntu 24.04
          # runner because GitHub Actions has no native Debian
          # runner image. Inside the container, cargo-deb's `$auto`
          # resolves the trixie-correct package names automatically:
          # libfuse3-4 (was libfuse3-3 in earlier Debian), libssl3t64,
          # libfido2-1t64, libtss2-*-0t64. No post-process dep
          # rewriting needed; the .deb installs cleanly on Debian 13
          # without "unmet dependencies: libfuse3-3 but it is not
          # installable" errors that pre-fix releases produced when
          # users tried the noble artifact on trixie.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            ubuntu_codename: trixie
            container: debian:trixie
            build_rpm: false
            archive: luksbox-${{ github.ref_name }}-x86_64-linux-trixie.tar.gz
          # Linux aarch64 - Debian 13 (trixie). Native ARM64 runner
          # + ARM64 `debian:trixie` container (Docker pulls the
          # matching `linux/arm64` variant when run on ARM hardware,
          # no QEMU translation involved -- the runner IS arm64).
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            ubuntu_codename: trixie
            container: debian:trixie
            build_rpm: false
            archive: luksbox-${{ github.ref_name }}-aarch64-linux-trixie.tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: luksbox-${{ github.ref_name }}-x86_64-windows.zip
          # Intel macOS is disabled, the macos-13 runner is being
          # phased out by GitHub and the build was blocking the rest of
          # the matrix. Apple Silicon (aarch64-apple-darwin below) is
          # the supported macOS target. To re-enable Intel:
          #   1. uncomment the block below
          #   2. confirm `runs-on: macos-13` is still available
          #      (https://github.com/actions/runner-images)
          # - target: x86_64-apple-darwin
          #   runner: macos-13         # last Intel macOS runner
          #   archive: luksbox-${{ github.ref_name }}-x86_64-macos.tar.gz
          # macOS Apple Silicon, two parallel builds -- one per FUSE
          # backend. Each runner installs ONLY the matching provider
          # (no fallback) and produces a backend-suffixed .dmg + .tar.gz.
          # End users on the download page pick the variant matching
          # the FUSE provider they want to install.
          #
          # Why two builds and not one universal:
          #   - libfuse-t.dylib (FUSE-T) and libfuse.2.dylib (macFUSE)
          #     define the same C symbols. They cannot coexist in the
          #     same Mach-O binary; the linker would either reject or
          #     silently pick one.
          #   - The FUSE-T variant has no MFMount.framework dependency
          #     and works cleanly on any Mac without prior FUSE install.
          #   - The macFUSE variant transitively links MFMount and
          #     REQUIRES macFUSE installed at the system path; without
          #     it the .app crashes at launch (dyld kills the process
          #     before main() runs). Documented in the release notes.
          - target: aarch64-apple-darwin
            runner: macos-14
            fuse_backend: fuset
            archive: luksbox-${{ github.ref_name }}-aarch64-macos-fuset.dmg
          - target: aarch64-apple-darwin
            runner: macos-14
            fuse_backend: macfuse
            archive: luksbox-${{ github.ref_name }}-aarch64-macos-macfuse.dmg

    steps:
      # Trixie-only: install minimum tooling the `debian:trixie` base
      # image lacks. Must run BEFORE actions/checkout (needs git) and
      # before dtolnay/rust-toolchain (needs curl + ca-certificates
      # for rustup's installer download). build-essential pulls in
      # gcc + linker so cargo can link the resulting binaries against
      # the native shared libs we install in the "Linux deps (apt)"
      # step below. No-op (skipped) on every other matrix entry
      # because they run on the host runner where these are
      # pre-installed.
      - name: Bootstrap Trixie container
        if: matrix.container
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl build-essential
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          # Include fuse_backend so the two macOS variants (fuset /
          # macfuse) don't share a cache slot -- they link different
          # libfuse families so cached artifacts would poison each
          # other. Empty for non-macOS targets, no behavior change.
          key: ${{ matrix.target }}-${{ matrix.fuse_backend }}
          # cache hit-rate matters most on Windows where vcpkg also
          # builds OpenSSL from source; the rust-cache covers ~/.cargo.
          # The `-vN` suffix is a manual cache-bust knob: when a feature
          # set / dep version / workspace member changes shape, stale
          # restored artifacts can produce `error[E0463]: can't find
          # crate for X` even though Cargo.toml looks correct. Bumping
          # the suffix forces a clean rebuild across every matrix entry.
          # Last bump: 2026-05-19 (Round 12 reshaped luksbox-fido2 +
          # luksbox-mount: new `subtle` workspace dep on fido2,
          # HmacSecret newtype, MasterVolumeKey::from_zeroizing
          # constructor, new windows-sys features on mount. Stale jammy
          # artifacts then reported "can't find crate for fuser" and
          # "can't find crate for zbus" because the cached luksbox-mount
          # rlib was built before the dep graph was reshaped.).
          shared-key: release-v3

      - name: Derive LUKSBOX_VERSION
        # On a tag push (`refs/tags/vX.Y.Z`), GITHUB_REF_NAME is the tag
        # ("vX.Y.Z") and we strip the leading `v`. On any other ref
        # (workflow_dispatch from a branch, scheduled runs), the
        # ref_name is the BRANCH NAME, NOT a version - so we fall back
        # to the workspace version baked into Cargo.toml. This prevents
        # the bug where dispatching from a branch called "fuse-t" gave
        # CFBundleShortVersionString="fuse-t" in the .app's Info.plist.
        # Cross-platform implementation: bash on Linux/macOS, the
        # Windows job (PowerShell) does the same logic inline since we
        # can't easily share a step interpreter.
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME:-}"
          if [[ "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="${REF#v}"
          else
              # Fallback: read [workspace.package].version from Cargo.toml
              VERSION="$(awk '
                /^\[workspace\.package\]/ { in_wp = 1; next }
                /^\[/                       { in_wp = 0 }
                in_wp && /^version[[:space:]]*=/ {
                    gsub(/.*= *"|".*/, ""); print; exit
                }' Cargo.toml)"
              if [[ -z "$VERSION" ]]; then
                  echo "::error::could not derive version: GITHUB_REF_NAME=$REF doesnt match vX.Y.Z and Cargo.toml [workspace.package].version is empty"
                  exit 1
              fi
              echo "==> non-tag build (ref=$REF), using Cargo.toml version $VERSION"
          fi
          echo "LUKSBOX_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "==> LUKSBOX_VERSION=$VERSION"

      - name: Derive LUKSBOX_VERSION (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ref = $env:GITHUB_REF_NAME
          if ($ref -match '^v(\d+\.\d+\.\d+.*)$') {
              $version = $Matches[1]
          } else {
              $line = (Get-Content Cargo.toml | Select-String -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1)
              if ($line -and $line.Matches[0].Groups[1].Value) {
                  $version = $line.Matches[0].Groups[1].Value
                  Write-Host "==> non-tag build (ref=$ref), using Cargo.toml version $version"
              } else {
                  Write-Error "could not derive version from ref=$ref or Cargo.toml"
                  exit 1
              }
          }
          "LUKSBOX_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "==> LUKSBOX_VERSION=$version"

      # ---- per-OS system deps -------------------------------------------------

      - name: Linux deps (apt)
        if: runner.os == 'Linux'
        # Same set on x86_64 and arm64 runners. libgtk-3-dev is here
        # because luksbox-gui's `rfd` file picker links against GTK3
        # on Linux. libfuse3-dev is here so the `mount` subcommand
        # works on the resulting binary. imagemagick is here for
        # scripts/build_icons.sh. libclang-dev is here because the
        # `libfido2-sys` build script runs `bindgen` to generate
        # Rust FFI bindings against the system libfido2 headers, and
        # bindgen needs libclang to parse C. The Ubuntu hosted
        # runners ship clang/libclang preinstalled (no-op), but the
        # bare debian:trixie container we use for the Trixie .deb
        # matrix entry does not, so the package has to be listed.
        #
        # ./.github/actions/apt-install forces IPv4 + retries on
        # transient mirror failures. Without IPv4 forcing the arm64
        # runners (ubuntu-22.04-arm / ubuntu-24.04-arm) frequently
        # time out trying to fetch from ports.ubuntu.com's IPv6
        # addresses, which the runner network can't route to.
        uses: ./.github/actions/apt-install
        with:
          packages: |
            pkg-config
            libfido2-dev
            libssl-dev
            libudev-dev
            zlib1g-dev
            libfuse3-dev
            libgtk-3-dev
            libtss2-dev
            libclang-dev
            imagemagick

      - name: macOS deps (Homebrew)
        if: runner.os == 'macOS'
        # `HOMEBREW_NO_INSTALL_FROM_API=1` forces brew to read formula
        # and cask metadata from the locally-cloned `homebrew/core` and
        # `homebrew/cask` taps (.rb files on disk) instead of the
        # JSON-formatted API at formulae.brew.sh. Recent Homebrew
        # releases shipped a regression in the cask API parser
        # (`undefined method 'to_sym' for nil` inside
        # `cask_struct_generator.rb`) that crashes `brew install` on
        # certain cask `depends_on` shapes returned by the API. The
        # local-tap path runs the regular Ruby DSL eval and isn't
        # affected. Set at the step level so both this command AND
        # the macFUSE cask install below benefit.
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          brew update
          # imagemagick : scripts/build_icons.sh
          # iconutil    : ships with Xcode, no install needed
          # dylibbundler: rewrites @rpath/dylib references inside the
          #               .app so end users don't need `brew install
          #               libfido2`. Cheaper than `install_name_tool` by
          #               hand for the transitive closure (libcbor,
          #               libcrypto, libssl).
          # create-dmg  : produces a real .dmg with an Applications drop
          #               link instead of shipping a raw .tar.gz that
          #               looks alien to Mac users.
          #
          # `--formula` is belt-and-suspenders alongside the env var
          # above: forces resolution against the formula tap only and
          # skips any chance of touching the cask API code path. All
          # five names here are formulas (no casks).
          brew install --formula libfido2 pkg-config imagemagick dylibbundler create-dmg
          # FUSE backend selection: deterministic per matrix entry.
          # The matrix exposes `fuse_backend: fuset|macfuse`; this step
          # installs ONLY that backend (no fallback) and fails the
          # build if it can't be installed. Two parallel matrix runs
          # produce one .dmg per backend; users on the download page
          # pick whichever matches the FUSE provider they want.
          #
          # See docs/MACOS_FUSE_T.md "Threat model differences vs
          # macFUSE" for the user-facing tradeoffs that drive this
          # split (FUSE-T = no kext, weaker local-attacker resistance;
          # macFUSE = kext, stronger local-attacker resistance).
          set -e

          FUSE_BACKEND=""
          FUSE_PC_PATH=""

          case "${{ matrix.fuse_backend }}" in
              fuset)
                  echo "==> Installing FUSE-T (kext-free backend)"
                  if ! brew list --cask fuse-t >/dev/null 2>&1; then
                      # FUSE-T lives in the macos-fuse-t tap, not core.
                      brew tap macos-fuse-t/homebrew-cask
                      brew install --cask fuse-t
                  fi
                  for cand in /usr/local/lib/pkgconfig /opt/homebrew/lib/pkgconfig; do
                      if [ -f "$cand/fuse-t.pc" ]; then
                          FUSE_BACKEND="fuse-t"
                          FUSE_PC_PATH="$cand"
                          break
                      fi
                  done
                  if [ -z "$FUSE_BACKEND" ]; then
                      echo "::error::FUSE-T install reported success but fuse-t.pc not found at /usr/local/lib/pkgconfig or /opt/homebrew/lib/pkgconfig"
                      ls -la /usr/local/lib/pkgconfig/ /opt/homebrew/lib/pkgconfig/ 2>&1 || true
                      exit 1
                  fi
                  echo "    fuse-t.pc:      $FUSE_PC_PATH/fuse-t.pc"
                  PKG_CONFIG_PATH="$FUSE_PC_PATH" pkg-config --modversion fuse-t 2>&1 \
                      | sed 's/^/    libfuse-t:      /' || true

                  # Inspect (not gate) libfuse-t.dylib's upstream
                  # install_name. FUSE-T 1.x ships with
                  # `@rpath/libfuse-t.dylib` (relative). On its own
                  # that would be an injection vector via
                  # DYLD_LIBRARY_PATH / DYLD_FALLBACK_LIBRARY_PATH,
                  # BUT the shipped .app neutralises this via two
                  # later steps:
                  #   (a) dylibbundler (run during the .app build
                  #       below) copies libfuse-t.dylib into
                  #       Contents/Frameworks/ AND rewrites every
                  #       LC_LOAD_DYLIB reference in our binaries
                  #       from `@rpath/libfuse-t.dylib` to
                  #       `@executable_path/../Frameworks/libfuse-t.dylib`.
                  #       After bundling, no @rpath reference to
                  #       libfuse-t remains in the shipped binary.
                  #   (b) hardened runtime (applied during codesign
                  #       below) strips DYLD_LIBRARY_PATH /
                  #       DYLD_FALLBACK_LIBRARY_PATH from the
                  #       process environment at exec time, so even
                  #       if @rpath had survived, env-var-based
                  #       injection would be blocked at the OS level.
                  # The actual security check is the post-build
                  # verification step ("Verify shipped binary has no
                  # unsafe @rpath references") below, which inspects
                  # the FINAL binary after both (a) and (b).
                  FUSE_T_DYLIB=""
                  for cand in $(brew --prefix)/lib/libfuse-t.dylib \
                              /usr/local/lib/libfuse-t.dylib \
                              /opt/homebrew/lib/libfuse-t.dylib; do
                      if [ -f "$cand" ]; then
                          FUSE_T_DYLIB="$cand"
                          break
                      fi
                  done
                  if [ -z "$FUSE_T_DYLIB" ]; then
                      echo "::error::libfuse-t.dylib not found at any of: \$(brew --prefix)/lib, /usr/local/lib, /opt/homebrew/lib"
                      exit 1
                  fi
                  FUSE_T_INSTALL_NAME="$(otool -D "$FUSE_T_DYLIB" 2>/dev/null \
                                         | tail -n1 | tr -d '[:space:]')"
                  echo "    libfuse-t path: $FUSE_T_DYLIB"
                  echo "    install_name:   $FUSE_T_INSTALL_NAME (informational)"
                  if [ -z "$FUSE_T_INSTALL_NAME" ]; then
                      echo "::error::otool -D returned no install_name for $FUSE_T_DYLIB. Cannot inspect."
                      exit 1
                  fi
                  ;;

              macfuse)
                  echo "==> Installing macFUSE (kext-based backend)"
                  if ! brew list --cask macfuse >/dev/null 2>&1; then
                      brew install --cask macfuse
                  fi
                  for cand in /usr/local/lib/pkgconfig \
                              /opt/homebrew/lib/pkgconfig \
                              /Library/Frameworks/macFUSE.framework/Versions/A/lib/pkgconfig; do
                      if [ -f "$cand/fuse.pc" ]; then
                          FUSE_BACKEND="fuse"
                          FUSE_PC_PATH="$cand"
                          break
                      fi
                  done
                  if [ -z "$FUSE_BACKEND" ]; then
                      echo "::error::macFUSE install reported success but fuse.pc not found"
                      ls -la /usr/local/lib/pkgconfig/ /opt/homebrew/lib/pkgconfig/ 2>&1 || true
                      exit 1
                  fi
                  MOUNT_MACFUSE="/Library/Filesystems/macfuse.fs/Contents/Resources/mount_macfuse"
                  if [ ! -x "$MOUNT_MACFUSE" ]; then
                      echo "::error::macFUSE installed but $MOUNT_MACFUSE missing or not executable"
                      ls -la /Library/Filesystems/macfuse.fs/Contents/Resources/ 2>&1 || true
                      exit 1
                  fi
                  echo "    fuse.pc:        $FUSE_PC_PATH/fuse.pc"
                  echo "    mount_macfuse:  $MOUNT_MACFUSE"
                  PKG_CONFIG_PATH="$FUSE_PC_PATH" pkg-config --modversion fuse 2>&1 \
                      | sed 's/^/    libfuse:        /' || true
                  ;;

              *)
                  echo "::error::matrix.fuse_backend must be 'fuset' or 'macfuse'; got '${{ matrix.fuse_backend }}'"
                  exit 1
                  ;;
          esac

          # Write the env that the cargo build steps read. The
          # selected feature flag flips luksbox-mount from the no-op
          # stub to either the FUSE-T or macFUSE backend.
          {
            echo "PKG_CONFIG_PATH=$(brew --prefix libfido2)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig:$FUSE_PC_PATH"
            echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix libfido2)/lib"
            echo "LUKSBOX_FEATURES=hardware,$FUSE_BACKEND"
            echo "LUKSBOX_FUSE_BACKEND=$FUSE_BACKEND"
          } >> "$GITHUB_ENV"

      - name: Import Developer ID certificate (macOS)
        # Only fires when the .p12 secret is present. PR builds and
        # forks without the secret fall through to unsigned artifacts
        # (the codesign step below also gates on the same secret).
        if: runner.os == 'macOS' && env.APPLE_DEVELOPER_ID_CERT_P12_B64 != ''
        env:
          APPLE_DEVELOPER_ID_CERT_P12_B64:  ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_B64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          MACOS_CI_KEYCHAIN_PASSWORD:       ${{ secrets.MACOS_CI_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          # Decode the base64-armored .p12 into a temp file. The .p12
          # holds the Developer ID Application certificate + its private
          # key, exported from Keychain Access (or assembled with
          # openssl pkcs12). Lives only for the duration of this CI
          # run, then the runner cleans up.
          #
          # `tr -d '\n\r '` defensively strips any line-wrapping or
          # stray whitespace that may survive the GitHub-secrets
          # round-trip (`base64 -i foo` on macOS line-wraps at 76
          # columns by default; `printf '%s'` preserves that, then
          # `base64 --decode` on some BSD-base64 builds chokes on
          # multi-line input). Single-line input is universally
          # accepted.
          P12_PATH="$RUNNER_TEMP/devid.p12"
          printf '%s' "$APPLE_DEVELOPER_ID_CERT_P12_B64" \
            | tr -d '\n\r ' \
            | base64 --decode > "$P12_PATH"
          # Sanity-check the decoded bytes look like a PKCS12 envelope
          # before handing to `security`. PKCS12 starts with the
          # ASN.1 SEQUENCE tag 0x30 followed by a length descriptor;
          # a corrupted base64 transport typically yields random
          # bytes here. The `file` magic check is cheap and turns a
          # cryptic `MAC verification failed` later into a clear
          # `decoded blob is not a PKCS12 envelope` here.
          DECODED_HEAD=$(xxd -l 8 "$P12_PATH" | head -1 | awk '{print $2$3$4$5}')
          if ! [[ "$DECODED_HEAD" =~ ^30[0-9a-f]{2,4} ]]; then
              echo "::error::APPLE_DEVELOPER_ID_CERT_P12_B64 decoded to non-PKCS12 bytes."
              echo "         First 8 decoded bytes: $DECODED_HEAD (expected 30xx... ASN.1 SEQUENCE)."
              echo "         Likely cause: the secret was pasted with line-wrapping or"
              echo "         truncated. Re-encode locally with a single-line form:"
              echo "             openssl base64 -A -in devid.p12 | pbcopy"
              echo "         and replace the secret value."
              exit 1
          fi

          # Create a brand-new keychain dedicated to this build. We
          # do NOT touch the runner's login keychain because:
          #   1. concurrent jobs on the same runner would race on it
          #   2. the runner's login keychain is destroyed at job end
          #      anyway, but a fresh keychain makes ownership obvious
          #   3. set-key-partition-list on the login keychain would
          #      prompt for the runner's interactive password
          KEYCHAIN_PATH="$RUNNER_TEMP/luksbox-build.keychain-db"
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain    -p "$MACOS_CI_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Pre-verify the .p12 with OpenSSL BEFORE handing to
          # `security import`. macOS's `security import` only accepts
          # PKCS12 envelopes encrypted with the legacy PBES1 algorithm
          # set (3DES); modern OpenSSL 3.x defaults to PBES2 (AES-256)
          # which `security` rejects with a generic "MAC verification
          # failed" that is identical to the wrong-password error.
          # OpenSSL accepts both, so a successful OpenSSL verify here
          # combined with a `security import` failure proves the
          # .p12 is in the wrong format (re-export with `-legacy`).
          # Also surfaces the password length so a hidden trailing
          # newline / quote becomes visible without leaking the value.
          PW_LEN=${#APPLE_DEVELOPER_ID_CERT_PASSWORD}
          P12_SHA=$(shasum -a 256 "$P12_PATH" | awk '{print $1}')
          echo "==> .p12 sha256: $P12_SHA"
          echo "==> APPLE_DEVELOPER_ID_CERT_PASSWORD length: $PW_LEN chars"
          if openssl pkcs12 -in "$P12_PATH" \
              -password "pass:$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
              -nokeys -noout 2>/dev/null
          then
              echo "==> OpenSSL pre-verify: .p12 + password OK"
          else
              echo "::error::OpenSSL pre-verify FAILED. The .p12 password"
              echo "         does not match the .p12 file. Either:"
              echo "           1. The APPLE_DEVELOPER_ID_CERT_PASSWORD secret"
              echo "              contains hidden characters (trailing newline,"
              echo "              quotes, leading whitespace), OR"
              echo "           2. The .p12 was re-exported with a different"
              echo "              password and the new one wasn't pushed to"
              echo "              the GitHub secret yet."
              echo "         Re-export locally and verify before re-uploading:"
              echo "             openssl pkcs12 -export -legacy -out devid.p12 \\"
              echo "                 -inkey devid.key -in devid.pem"
              echo "             openssl pkcs12 -in devid.p12 \\"
              echo "                 -password \"pass:THE_PASSWORD\" -nokeys -noout"
              exit 1
          fi

          # Import .p12 into the new keychain. -A allows any tool to
          # use the key (codesign needs this); -t cert + -f pkcs12
          # tells security how to parse the input.
          if ! security import "$P12_PATH" \
              -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          then
              echo "::error::OpenSSL accepted the .p12 + password, but macOS"
              echo "         'security import' rejected it. This is the"
              echo "         classic symptom of a PBES2 (AES-encrypted)"
              echo "         PKCS12, which OpenSSL accepts but pre-Sonoma-14.4"
              echo "         'security import' does not. Re-export the .p12"
              echo "         with the legacy PBES1 algorithms:"
              echo "             openssl pkcs12 -export -legacy \\"
              echo "                 -out devid.p12 \\"
              echo "                 -inkey devid.key -in devid.pem \\"
              echo "                 -name 'Developer ID Application'"
              echo "         Then re-encode + replace the secret:"
              echo "             openssl base64 -A -in devid.p12 | pbcopy"
              exit 1
          fi

          # Without this, codesign prompts the user (impossible on a
          # CI runner) for permission to use the private key. The
          # partition list grants programmatic access keyed to the
          # keychain password we just set.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_CI_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to the search list so codesign and notarytool find the
          # identity. Preserves whatever was already there (the runner's
          # login keychain etc.) by appending rather than replacing.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '" ' | tr '\n' ' ')

          # Sanity: print the resolved signing identity. Should match
          # "Developer ID Application: Sebastien Dudek (XXXXXXXXXX)".
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Surface the keychain path for downstream codesign steps.
          echo "MACOS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm -f "$P12_PATH"

      - name: Set Linux feature list
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Linux: hardware + fuse (libfido2 + libfuse3 from apt).
          # winfsp is Windows-only, omit on Linux to avoid cargo
          # tripping on the target-cfg'd optional dep.
          echo "LUKSBOX_FEATURES=hardware,fuse" >> "$GITHUB_ENV"

      - name: Set Windows feature list
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Windows: hardware + winfsp. Fuse is linux/macos-only.
          echo "LUKSBOX_FEATURES=hardware,winfsp" >> "$GITHUB_ENV"

      - name: Windows deps (WinFsp)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # libfido2 is NO LONGER NEEDED on Windows. We talk to FIDO2
          # via webauthn.dll directly (see crates/luksbox-fido2/src/
          # webauthn.rs), dynamically linked through the `windows`
          # crate at compile time. This avoids the vcpkg dependency
          # AND the non-elevated USB FIDO2 access problem in one
          # stroke.

          # WinFsp SDK + driver via Chocolatey (preinstalled on
          # windows-latest). winfsp_wrs_sys's build.rs reads the
          # standard registry entry / Program Files install path
          # that this drops. Fall back to a direct MSI download if
          # choco's package gets delisted or the install fails.
          $ErrorActionPreference = 'Continue'
          choco install winfsp -y --no-progress
          if (-not (Test-Path "C:\Program Files (x86)\WinFsp\inc\winfsp\winfsp.h") -and
              -not (Test-Path "C:\Program Files\WinFsp\inc\winfsp\winfsp.h")) {
              Write-Host "==> choco install didn't drop WinFsp SDK, falling back to direct MSI"
              $msi = "$env:RUNNER_TEMP\winfsp.msi"
              Invoke-WebRequest `
                  -Uri "https://github.com/winfsp/winfsp/releases/download/v2.0/winfsp-2.0.23075.msi" `
                  -OutFile $msi
              Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /quiet /norestart" -Wait
          }
          # ImageMagick for scripts/build_icons.sh. Preinstalled on
          # windows-latest, but we install defensively in case GitHub
          # ever drops it from the runner image.
          if (-not (Get-Command magick -ErrorAction SilentlyContinue)) {
              choco install imagemagick.tool -y --no-progress
          }

      # ---- generated assets ---------------------------------------------------

      - name: Generate platform icons (.ico + .icns from icon.png)
        shell: bash
        run: |
          # Produces crates/luksbox-gui/assets/icon.ico (consumed by
          # luksbox-gui's build.rs and embedded into the .exe) and
          # crates/luksbox-gui/assets/icon.icns (consumed by the macOS
          # bundle step below). Both files are .gitignored so this step
          # MUST run before `cargo build` for the Windows .exe icon to
          # actually appear in Explorer.
          bash scripts/build_icons.sh

      # ---- build --------------------------------------------------------------

      - name: Build CLI
        shell: bash
        run: |
          # LUKSBOX_FEATURES is set per-OS in the steps above. Always a
          # subset of {hardware, fuse, winfsp} valid for the target OS.
          # `release-hardened` (defined in workspace Cargo.toml) turns on
          # fat LTO + panic=abort + strip=symbols + debug=false so the
          # shipped binary has no symbol names, no panic strings, and no
          # DWARF info - see the profile's docstring in Cargo.toml.
          # Output goes to target/<triple>/release-hardened/ (NOT
          # target/<triple>/release/), so all subsequent steps must
          # reference the new path.
          cargo build --profile release-hardened -p luksbox-cli \
            --no-default-features --features "$LUKSBOX_FEATURES" \
            --target ${{ matrix.target }}

      - name: Build GUI
        shell: bash
        run: |
          cargo build --profile release-hardened -p luksbox-gui \
            --no-default-features --features "$LUKSBOX_FEATURES" \
            --target ${{ matrix.target }}

      - name: Verify mount feature is actually compiled in (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          # The release.yml has had silent regressions in the past
          # where LUKSBOX_FEATURES included `fuse` but the binary
          # ended up with the stub MountError::Unsupported anyway
          # (fuser feature plumbing is gated on a chain of cargo
          # `default-features = false` + per-crate re-enables, easy
          # to break). This step calls `luksbox mount` against
          # nonexistent paths and inspects the error: a real mount
          # implementation reports "no such file" / open failure;
          # the stub reports "mount support was not compiled into
          # this binary". We fail loud on the latter.
          BIN="target/${{ matrix.target }}/release-hardened/luksbox"
          if [ ! -x "$BIN" ]; then
              echo "::warning::CLI binary not at $BIN; skipping verify"
              exit 0
          fi
          # Probe the mount path. Pass paths that won't exist so we
          # never actually mount anything. mount needs an unlock so
          # we feed it a passphrase via stdin, but the open will
          # fail before any real mount work so the passphrase is
          # never consulted.
          OUT=$( (echo "x" | "$BIN" mount /tmp/__luksbox_probe_nonexistent.lbx /tmp/__luksbox_probe_mp 2>&1) || true )
          if echo "$OUT" | grep -q "mount support was not compiled into this binary"; then
              echo "::error::Built CLI returns MountError::Unsupported, the fuse feature did NOT make it into the binary. LUKSBOX_FEATURES was '$LUKSBOX_FEATURES' but the build cache may have stale artifacts. Probe output:"
              echo "$OUT"
              exit 1
          fi
          echo "==> mount path is the real implementation (LUKSBOX_FEATURES=$LUKSBOX_FEATURES)"

      # ---- package ------------------------------------------------------------

      - name: Strip + stage (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release-hardened/luksbox" staging/
          cp "target/${{ matrix.target }}/release-hardened/luksbox-gui" staging/
          strip staging/luksbox || true
          strip staging/luksbox-gui || true
          # Bundle the user-visible docs alongside the binaries.
          # Required files. Fail loud if any go missing from the repo
          # root, the install.sh + .desktop refer to README/LICENSE etc.
          for f in README.md LICENSE NOTICE TRADEMARK.md; do
            if [ ! -f "$f" ]; then
              echo "Required file '$f' missing from repo root, commit it before tagging." >&2
              exit 1
            fi
            cp "$f" staging/
          done
          # Optional docs.
          for f in SECURITY.md TUTORIAL.md; do
            [ -f "$f" ] && cp "$f" staging/ || true
          done
          # Ship the .desktop launcher + per-size icons + MIME type +
          # installer so users get a GNOME/KDE menu entry, the right
          # icon at every DPI, and "Open with LUKSbox" on right-click
          # of any .lbx file. Filenames use the reverse-DNS app_id
          # (must match `with_app_id` in luksbox-gui/src/main.rs) so
          # Wayland compositors resolve the window's app_id back to
          # the .desktop file's `Name=` field.
          mkdir -p staging/share/applications \
                   staging/share/mime/packages
          cp dist/com.penthertz.luksbox.desktop staging/share/applications/
          cp dist/com.penthertz.luksbox.xml     staging/share/mime/packages/
          # Per-size icons. scripts/build_icons.sh produced
          # crates/luksbox-gui/assets/icons-linux/<N>x<N>.png for each
          # canonical hicolor size; drop each into its own size dir.
          for size in 16 24 32 48 64 128 256 512; do
            src="crates/luksbox-gui/assets/icons-linux/${size}x${size}.png"
            if [ -f "$src" ]; then
              dst="staging/share/icons/hicolor/${size}x${size}/apps"
              mkdir -p "$dst"
              cp "$src" "$dst/com.penthertz.luksbox.png"
            fi
          done
          cp dist/install.sh staging/install.sh
          chmod +x staging/install.sh
          tar -C staging -czf "${{ matrix.archive }}" .
          ls -lh "${{ matrix.archive }}"

      # ---- Linux native packages (deb + rpm) -------------------------------
      #
      # Generates a Debian/Ubuntu .deb and a Fedora/RHEL .rpm from the
      # release-hardened binaries we just built. Metadata lives in
      # crates/luksbox-cli/Cargo.toml under [package.metadata.deb] and
      # [package.metadata.generate-rpm]; this step only invokes the tools.
      #
      # We use cargo-deb's `--no-build` so the binaries from the
      # `cargo build --profile release-hardened` step above are reused
      # (avoids a 2x build cost). Same for cargo-generate-rpm - it's
      # post-build only, never invokes cargo.
      #
      # Both tools are pinned to specific minor versions: cargo-deb 3.x
      # is the current stable line (TOML-asset-array syntax we use here
      # was introduced in 2.x); cargo-generate-rpm 0.16+ understands the
      # `requires` map syntax we use.

      - name: Install cargo-deb + cargo-generate-rpm
        if: runner.os == 'Linux'
        run: |
          # Locked installs to keep CI deterministic across runs. Both
          # tools are pure-Rust, no system deps beyond what cargo itself
          # already requires.
          cargo install --locked cargo-deb@^3
          cargo install --locked cargo-generate-rpm@^0.16

      - name: Build .deb (Linux)
        if: runner.os == 'Linux'
        # `shell: bash` is explicit because container-based steps
        # (debian:trixie matrix entry) default to `sh -e` = dash, which
        # doesn't support the `${VAR/old/new}` parameter expansion used
        # below. Hosted ubuntu runners default to bash already; this
        # keeps both flows identical.
        shell: bash
        run: |
          # --no-build: reuse the binaries the previous step built.
          # --profile release-hardened: tells cargo-deb where to find
          #   them (target/<triple>/release-hardened/).
          # --target: same triple as the build to keep paths consistent.
          cargo deb \
            -p luksbox-cli \
            --no-build \
            --profile release-hardened \
            --target ${{ matrix.target }}
          # cargo-deb's output path varies between versions: 3.x with
          # `--target` historically wrote to target/<triple>/debian/,
          # but in practice (observed on debian:trixie + cargo-deb
          # 3.x) the file lands in plain target/debian/. Use `find`
          # so we pick up the .deb wherever cargo-deb put it instead
          # of assuming a specific layout.
          DEB_PATH=$(find target -path '*debian/luksbox_*.deb' -type f | head -n1)
          if [ -z "$DEB_PATH" ]; then
              echo "::error::cargo-deb produced no .deb under target/"
              find target -name '*.deb' -print
              exit 1
          fi
          # Inject the distro codename so users can pick the .deb that
          # matches their distro (jammy / noble / trixie). The two
          # parameter expansions below cover both architectures: only
          # the matching one rewrites; the other is a no-op.
          NEW_DEB_PATH="${DEB_PATH/_amd64.deb/_${{ matrix.ubuntu_codename }}_amd64.deb}"
          NEW_DEB_PATH="${NEW_DEB_PATH/_arm64.deb/_${{ matrix.ubuntu_codename }}_arm64.deb}"
          mv "$DEB_PATH" "$NEW_DEB_PATH"
          DEB_PATH="$NEW_DEB_PATH"
          echo "DEB_PATH=$DEB_PATH" >> "$GITHUB_ENV"
          ls -lh "$DEB_PATH"
          # Quick sanity check: list contents so a missing asset
          # surfaces in the CI log instead of in user bug reports.
          dpkg-deb -c "$DEB_PATH" | head -40
          # Show the resolved Depends so it's visible in the CI log
          # (this is what determines per-distro compatibility).
          echo "--- Depends: ---"
          dpkg-deb -f "$DEB_PATH" Depends

      - name: Build .rpm (Linux)
        # Only on the jammy matrix entries (one per arch). RPM uses
        # SONAME-based requires that are version-constraint-free and
        # work across Fedora / RHEL / openSUSE versions, so a single
        # .rpm covers every rpm-based distro. We pick the jammy
        # binaries for their wider glibc compatibility.
        if: runner.os == 'Linux' && matrix.build_rpm
        run: |
          # NB: cargo-generate-rpm's `-p` is a *path* to the package
          # directory (it opens `<p>/Cargo.toml`), NOT a workspace
          # package name like cargo's / cargo-deb's `-p`. Pass the
          # full crates/<name> relative path. The Cargo.toml needs to
          # be the package's own manifest, not the workspace root.
          cargo generate-rpm \
            -p crates/luksbox-cli \
            --profile release-hardened \
            --target ${{ matrix.target }}
          # Output path is target/<triple>/generate-rpm/luksbox-<ver>-1.x86_64.rpm.
          RPM_PATH=$(ls target/${{ matrix.target }}/generate-rpm/luksbox-*.rpm | head -n1)
          echo "RPM_PATH=$RPM_PATH" >> "$GITHUB_ENV"
          ls -lh "$RPM_PATH"
          # Same sanity probe via rpm -qlp (read-only listing, no
          # database touch) so we see in the log what shipped.
          rpm -qlp "$RPM_PATH" | head -40 || true

      # ---- Linux package validation ----------------------------------------
      #
      # Catch package-level bugs in CI rather than user bug reports. Three
      # layers, fastest to slowest:
      #
      # 1. `lintian` static-analyses the .deb's control files, mode bits,
      #    declared deps, and FHS conformance. Catches metadata bugs that
      #    cargo-deb won't notice (wrong section, missing copyright,
      #    bad maintainer string).
      # 2. `rpmlint` does the same for the .rpm.
      # 3. Real `apt install` of our .deb on the runner, then a vault
      #    create + reopen round-trip. This is the only test that
      #    actually exercises the declared runtime dependencies
      #    (`libfido2-1`, `libfuse3-3`) - a typo in the depends line
      #    surfaces here as "package installation failed", not in user
      #    reports.
      # 4. The same .rpm installed inside a fedora:latest Docker
      #    container so the Fedora package-name choices (`libfido2`,
      #    `fuse3-libs`) get checked too. Just `--version` since FUSE
      #    inside a non-privileged container isn't reliable enough to
      #    do the full vault round-trip.

      - name: Lint .deb (lintian)
        if: runner.os == 'Linux'
        uses: ./.github/actions/apt-install
        with:
          packages: lintian

      - name: Run lintian against the .deb
        if: runner.os == 'Linux'
        # `--fail-on error` exits non-zero only on errors, not on
        # warnings/info/pedantic. cargo-deb output trips a few
        # benign warnings (no source package, no upstream changelog)
        # that we accept; real bugs (missing field, bad mode) are
        # errors and will fail the job.
        run: |
          lintian --no-tag-display-limit --info --display-info \
            --fail-on error "$DEB_PATH"

      - name: Lint .rpm (rpmlint)
        if: runner.os == 'Linux' && matrix.build_rpm
        uses: ./.github/actions/apt-install
        with:
          packages: rpmlint

      - name: Run rpmlint against the .rpm
        if: runner.os == 'Linux' && matrix.build_rpm
        run: |
          # `-c dist/rpm/rpmlint.toml` filters the small set of
          # cargo-generate-rpm 0.16.x output limitations + the
          # unsigned-RPM warning we accept on dev artifacts. Each
          # filter is documented inline in that file. Without the
          # config rpmlint would fail on `no-signature`,
          # `no-packager-tag`, `no-buildhost-tag`,
          # `no-changelogname-tag`, and `no-manual-page-for-binary`,
          # none of which are real packaging defects.
          rpmlint -c dist/rpm/rpmlint.toml "$RPM_PATH"

      - name: Install .deb + smoke test (Ubuntu runner)
        if: runner.os == 'Linux'
        run: |
          # apt resolves transitive deps (libfido2-1 -> libssl3,
          # libfuse3-3 -> fuse3, etc.) so this is the real test of
          # whether we declared the right runtime deps.
          #
          # apt-get only auto-detects a local .deb when the path is
          # absolute or begins with `./`; a bare `target/.../foo.deb`
          # is interpreted as a package NAME (apt error: "Unable to
          # locate package target/..."). Resolve to absolute first.
          DEB_ABS="$(realpath "$DEB_PATH")"
          sudo apt-get install -y "$DEB_ABS"

          # Binary-launchability smoke.
          which luksbox
          luksbox --version
          luksbox --help | head -3

          # Functional smoke: create a real vault, reopen it, list
          # the (empty) root. Argon2id at interactive defaults takes
          # ~500 ms in release; LUKSBOX_TEST_FAST_KDF is compiled out
          # of the release-hardened binary by design (see
          # crates/luksbox-cli/src/main.rs::test_fast_kdf_enabled).
          # LUKSBOX_PASSPHRASE / LUKSBOX_NEW_PASSPHRASE / LUKSBOX_ACCEPT_WEAK
          # are runtime-only and remain available; that's what we use
          # here.
          tmpdir=$(mktemp -d)
          cd "$tmpdir"
          LUKSBOX_NEW_PASSPHRASE='strongtest!Pass#42' \
          LUKSBOX_ACCEPT_WEAK=1 \
            luksbox create v.lbx
          [ -f v.lbx ] || { echo "::error::vault file not created"; exit 1; }
          # Reopen with the same passphrase via the existing-vault env.
          LUKSBOX_PASSPHRASE='strongtest!Pass#42' \
            luksbox ls v.lbx /
          echo "==> .deb installs cleanly + vault round-trip OK"

      - name: Install .rpm in Fedora container (cross-distro smoke)
        if: runner.os == 'Linux' && matrix.build_rpm
        run: |
          # Mount the .rpm into the container by absolute path (action
          # runs at the workspace root, so $RPM_PATH is workspace-
          # relative and resolves under $GITHUB_WORKSPACE).
          docker run --rm \
            -v "$GITHUB_WORKSPACE/$RPM_PATH:/tmp/luksbox.rpm:ro" \
            fedora:latest \
            bash -c '
              set -euo pipefail
              dnf install -y -q /tmp/luksbox.rpm
              # Just confirm the binary launches with all its dynamic
              # deps resolved on Fedora. Full vault round-trip requires
              # FUSE which is unreliable inside an unprivileged
              # container; we trust the .deb test above for that.
              luksbox --version
              luksbox --help | head -3
              echo "==> .rpm installs cleanly on Fedora"
            '

      - name: Upload Linux .deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          # Includes ubuntu_codename so jammy + noble entries on the
          # same target architecture don't collide. The release job's
          # download-artifact has merge-multiple: true so they all
          # end up in artifacts/.
          name: ${{ matrix.target }}-${{ matrix.ubuntu_codename }}-deb
          path: ${{ env.DEB_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux .rpm
        if: runner.os == 'Linux' && matrix.build_rpm
        uses: actions/upload-artifact@v4
        with:
          # Only the jammy entries produce an .rpm; noble entries
          # skip this step entirely. RPM is distro-portable so one
          # build per arch is enough.
          name: ${{ matrix.target }}-rpm
          path: ${{ env.RPM_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Build macOS .app bundle (with bundled dylibs)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          rm -rf dmg-root
          mkdir -p dmg-root

          # Hand-rolled .app bundle layout. cargo-bundle would do the
          # same thing in two steps but pulls in a 50 MB toolchain just
          # to write three files; we'd rather keep CI deps narrow.
          APP="dmg-root/LUKSbox.app"
          mkdir -p "$APP/Contents/MacOS" \
                   "$APP/Contents/Resources" \
                   "$APP/Contents/Frameworks"

          cp "target/${{ matrix.target }}/release-hardened/luksbox-gui" \
             "$APP/Contents/MacOS/luksbox-gui"
          strip "$APP/Contents/MacOS/luksbox-gui" || true

          # Bare CLI binary inside the .app too, so power users can
          # symlink /usr/local/bin/luksbox -> the .app's CLI without
          # needing the .dmg mounted.
          cp "target/${{ matrix.target }}/release-hardened/luksbox" \
             "$APP/Contents/MacOS/luksbox"
          strip "$APP/Contents/MacOS/luksbox" || true

          cp crates/luksbox-gui/assets/icon.icns \
             "$APP/Contents/Resources/icon.icns"

          # FUSE-T helper sandbox profile. Only meaningful on
          # builds with the fuse-t backend (the GUI's spawn path
          # looks for Contents/Resources/fuse-t-helper.sb when the
          # user opts into LUKSBOX_SANDBOX_HELPER=1). Ship it on
          # every macOS .app variant for symmetry; on the macFUSE
          # variant the file is unused but harmless.
          if [ -f dist/macos/sandbox/fuse-t-helper.sb ]; then
              cp dist/macos/sandbox/fuse-t-helper.sb \
                 "$APP/Contents/Resources/fuse-t-helper.sb"
          fi

          # ---- bundle libfido2 + libfuse-t + transitive deps ----
          # Without this, end users would need `brew install libfido2`
          # (etc.) before the binary could even start. dylibbundler
          # walks the binary's LC_LOAD_DYLIB list, copies non-system
          # dylibs into Contents/Frameworks/, and rewrites every
          # reference to use @executable_path/../Frameworks/<libname>.
          # Recursive, so libcbor / libcrypto / libssl follow
          # automatically.
          #
          # -of  : overwrite output (the binary itself with rewritten
          #        load commands)
          # -b   : bundle libraries
          # -d   : destination dir for the bundled dylibs
          # -p   : prefix for the new install names
          # -s   : extra search paths used to RESOLVE @rpath references
          #        before bundling. FUSE-T 1.x ships
          #        libfuse-t.dylib with `@rpath/libfuse-t.dylib` as its
          #        install name; without -s, dylibbundler doesn't know
          #        where to look and falls back to an INTERACTIVE
          #        prompt that hangs CI forever ("Please specify the
          #        directory where this library is located"). The two
          #        -s paths cover Intel-Homebrew (/usr/local/lib) and
          #        Apple-Silicon-Homebrew (/opt/homebrew/lib).
          # </dev/null : defence-in-depth so dylibbundler can NEVER
          #        hang on an interactive prompt; if it ever can't
          #        find a dylib, it gets EOF on stdin and aborts,
          #        which CI sees as a clear failure instead of a
          #        90-minute timeout.
          dylibbundler -of -b \
            -x "$APP/Contents/MacOS/luksbox-gui" \
            -x "$APP/Contents/MacOS/luksbox" \
            -d "$APP/Contents/Frameworks/" \
            -p "@executable_path/../Frameworks/" \
            -s /usr/local/lib \
            -s /opt/homebrew/lib \
            </dev/null

          # ---- Post-bundle DYLD security verification ----
          # The actual security gate for the @rpath / DYLD-injection
          # concern flagged at deps-step time. After dylibbundler, the
          # shipped binaries should reference every non-system dylib
          # via @executable_path/../Frameworks/... (which resolves
          # uniquely against the bundle and isn't influenced by env
          # vars). Walk the load commands and refuse to ship if any
          # @rpath reference survived for our known FUSE / FIDO deps,
          # which would mean dylibbundler missed something and the
          # binary would be vulnerable to dylib-search-path injection
          # at user-runtime.
          for bin in "$APP/Contents/MacOS/luksbox" \
                     "$APP/Contents/MacOS/luksbox-gui"; do
              echo "==> Verifying load commands of $bin"
              otool -L "$bin" | sed 's/^/    /'
              # Look for @rpath references to dylibs we expected
              # dylibbundler to bundle. System dylibs (those in
              # /usr/lib or /System) are fine, dyld resolves those
              # against the dyld_shared_cache. @rpath is fine ONLY
              # for system frameworks (e.g. SwiftUI), never for our
              # third-party deps.
              UNSAFE_RPATH="$(otool -L "$bin" \
                  | grep -E '^[[:space:]]+@rpath/(libfuse|libfido|libcbor|libcrypto|libssl|libtss)' \
                  || true)"
              if [ -n "$UNSAFE_RPATH" ]; then
                  echo "::error::$bin still has @rpath references to third-party dylibs after dylibbundler. dylibbundler should have rewritten these to @executable_path/../Frameworks/<lib>. Refusing to ship a binary vulnerable to DYLD search-path injection."
                  echo "$UNSAFE_RPATH" | sed 's/^/    /'
                  exit 1
              fi
              echo "    OK: no unsafe @rpath references to third-party dylibs"
          done

          # ---- Info.plist ----
          # CFBundleIdentifier MUST be a reverse-DNS string and stable
          # across versions (macOS uses it as the LaunchServices key).
          # CFBundleIconFile resolves against Contents/Resources/, so
          # "icon" -> "Resources/icon.icns".
          # CFBundleDocumentTypes + UTExportedTypeDeclarations make
          # Finder show "Open with LUKSbox" on right-click of any .lbx,
          # and double-click opens that file directly (luksbox-gui's
          # main.rs reads argv[1] and pre-fills the unlock screen).
          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>             <string>LUKSbox</string>
              <key>CFBundleDisplayName</key>      <string>LUKSbox</string>
              <key>CFBundleIdentifier</key>       <string>com.penthertz.luksbox</string>
              <key>CFBundleVersion</key>          <string>${LUKSBOX_VERSION}</string>
              <key>CFBundleShortVersionString</key><string>${LUKSBOX_VERSION}</string>
              <key>CFBundleExecutable</key>       <string>luksbox-gui</string>
              <key>CFBundleIconFile</key>         <string>icon</string>
              <key>CFBundlePackageType</key>      <string>APPL</string>
              <key>CFBundleSignature</key>        <string>????</string>
              <key>LSMinimumSystemVersion</key>   <string>11.0</string>
              <key>NSHighResolutionCapable</key>  <true/>
              <key>NSHumanReadableCopyright</key> <string>Copyright (c) 2026 Penthertz. Apache License 2.0. LUKSbox is a trademark of Penthertz.</string>

              <key>CFBundleDocumentTypes</key>
              <array>
                  <dict>
                      <key>CFBundleTypeName</key>        <string>LUKSbox encrypted vault</string>
                      <key>CFBundleTypeRole</key>        <string>Editor</string>
                      <key>LSHandlerRank</key>           <string>Owner</string>
                      <key>CFBundleTypeExtensions</key>  <array><string>lbx</string></array>
                      <key>CFBundleTypeIconFile</key>    <string>icon</string>
                      <key>LSItemContentTypes</key>
                      <array><string>com.penthertz.luksbox.vault</string></array>
                  </dict>
              </array>

              <key>UTExportedTypeDeclarations</key>
              <array>
                  <dict>
                      <key>UTTypeIdentifier</key>        <string>com.penthertz.luksbox.vault</string>
                      <key>UTTypeDescription</key>       <string>LUKSbox encrypted vault</string>
                      <key>UTTypeConformsTo</key>        <array><string>public.data</string></array>
                      <key>UTTypeIconFile</key>          <string>icon</string>
                      <key>UTTypeTagSpecification</key>
                      <dict>
                          <key>public.filename-extension</key><array><string>lbx</string></array>
                          <key>public.mime-type</key>         <array><string>application/x-luksbox-vault</string></array>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF

      - name: Code-sign macOS .app (only if Apple cert was imported)
        # Gates on `MACOS_KEYCHAIN_PATH`, which the earlier
        # `Import Developer ID certificate` step set ONLY when the
        # APPLE_DEVELOPER_ID_CERT_P12_B64 secret was present. PR builds
        # / forks without the secret therefore skip this step and ship
        # an unsigned .app (which Gatekeeper will warn about; that's
        # the trade-off for not exposing signing material to forks).
        if: runner.os == 'macOS' && env.MACOS_KEYCHAIN_PATH != ''
        env:
          MACOS_KEYCHAIN_PATH: ${{ env.MACOS_KEYCHAIN_PATH }}
        run: |
          set -euo pipefail
          APP="dmg-root/LUKSbox.app"

          # Resolve the signing identity dynamically out of our
          # imported keychain. The expected line looks like:
          #   1) ABC123... "Developer ID Application: Sebastien Dudek (XXXXXXXXXX)"
          # Hard-coding the team-ID-bracketed form into a secret would
          # work but means rotating the secret on every cert renewal;
          # discovery is simpler and avoids one moving part.
          IDENTITY=$(security find-identity -v -p codesigning "$MACOS_KEYCHAIN_PATH" \
              | awk -F '"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$IDENTITY" ]; then
              echo "::error::No 'Developer ID Application' identity found in $MACOS_KEYCHAIN_PATH"
              security find-identity -v "$MACOS_KEYCHAIN_PATH"
              exit 1
          fi
          echo "==> signing identity: $IDENTITY"

          # Sign innermost-first, in topological order: every dylib /
          # .so / framework binary inside Contents/Frameworks/ before
          # the .app bundle itself. `codesign --deep` (used here
          # historically) is officially deprecated by Apple since
          # Big Sur and produces brittle results when the bundle
          # contains nested frameworks or subdirs; explicit per-file
          # signing is the modern correct approach.
          if [ -d "$APP/Contents/Frameworks" ]; then
              find "$APP/Contents/Frameworks" -type f \
                  \( -name "*.dylib" -o -name "*.so" \) -print0 \
                  | xargs -0 -n1 -I{} codesign \
                      --force \
                      --timestamp \
                      --options runtime \
                      --keychain "$MACOS_KEYCHAIN_PATH" \
                      --sign "$IDENTITY" \
                      "{}"
          fi

          # Sign the bundled binaries (CLI + GUI). Both get the
          # hardened-runtime entitlements so libfido2 (bundled,
          # signed by us) can load and USB FIDO2 access works.
          for bin in "$APP/Contents/MacOS/luksbox" "$APP/Contents/MacOS/luksbox-gui"; do
              codesign --force --timestamp --options runtime \
                  --entitlements dist/macos/entitlements.plist \
                  --keychain "$MACOS_KEYCHAIN_PATH" \
                  --sign "$IDENTITY" "$bin"
          done

          # Sign the .app bundle itself. Same entitlements; this is
          # the signature Gatekeeper looks at on launch.
          codesign --force --timestamp --options runtime \
              --entitlements dist/macos/entitlements.plist \
              --keychain "$MACOS_KEYCHAIN_PATH" \
              --sign "$IDENTITY" \
              "$APP"

          # Verify the chain end-to-end. --strict catches missing
          # nested signatures; --deep ensures every Mach-O inside the
          # bundle was actually signed (the find-loop above SHOULD
          # have covered it; this is the belt-and-suspenders check).
          codesign --verify --deep --strict --verbose=2 "$APP"
          # Print the resulting signature shape for the CI log.
          codesign -dv --verbose=4 "$APP" 2>&1 | head -20

          # ---- Hardened-runtime entitlements assertion ----
          # The FUSE-T mount-helper subprocess receives the 32-byte
          # MasterVolumeKey on its inherited stdin pipe. The ONLY
          # sound mitigation against a same-UID process attaching
          # via task_for_pid() and snooping that pipe (or reading
          # the helper's memory after the MVK is constructed) is the
          # hardened runtime's get-task-allow=false posture, which
          # blocks task_for_pid from non-platform-binary callers.
          # Verify both binaries actually ship with that entitlement
          # absent or false; refuse to release if either has
          # get-task-allow=true (which would let any local same-UID
          # debugger attach and steal the MVK).
          for bin in "$APP/Contents/MacOS/luksbox" \
                     "$APP/Contents/MacOS/luksbox-gui"; do
              echo "==> Checking entitlements of $bin"
              # `codesign -d --entitlements - <bin>` prints the
              # entitlements plist on stdout (XML or binary plist
              # depending on macOS version). Convert to XML via
              # plutil so the grep below is reliable.
              ENTITLEMENTS_XML="$(codesign -d --entitlements - "$bin" 2>/dev/null \
                                  | plutil -convert xml1 -o - - 2>/dev/null \
                                  || echo '')"
              # If the entitlement is absent OR explicitly false, the
              # signed binary blocks task_for_pid from non-platform
              # callers - safe. If present AND true, fail the build.
              # First grep prints the key line + next line (the value);
              # second grep checks whether the value is <true/>.
              if echo "$ENTITLEMENTS_XML" \
                  | grep -A1 '<key>com.apple.security.get-task-allow</key>' \
                  | grep -q '<true/>'; then
                  echo "::error::$bin has com.apple.security.get-task-allow=true. \
                  This would let any same-UID process attach via task_for_pid and \
                  read the FUSE-T mount-helper's MVK from memory or the inherited \
                  stdin pipe. Refusing to ship a binary with this entitlement."
                  echo "Full entitlements:"
                  echo "$ENTITLEMENTS_XML" | sed 's/^/  /'
                  exit 1
              fi
              echo "    OK: get-task-allow is absent or false"
          done

      - name: Build macOS portable tarball (CLI + GUI, no .app)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          # An alternative to the .dmg for users who don't want to deal
          # with the Gatekeeper quarantine flow that comes with any
          # downloaded .app. A .tar.gz extracted via `tar xzf` from
          # Terminal does not propagate the com.apple.quarantine xattr
          # to the extracted files, so the binaries inside run without
          # right-click -> Open or `xattr -dr` gymnastics.
          #
          # Layout matches the .app's internal layout so the same
          # install_names dylibbundler emitted (@executable_path/../
          # Frameworks/<lib>) keep working in-place:
          #
          #     luksbox-<ver>-aarch64-macos-portable/
          #     ├── README-MACOS.txt
          #     ├── bin/
          #     │   ├── luksbox        # CLI
          #     │   └── luksbox-gui    # GUI
          #     └── Frameworks/
          #         ├── libfido2.*.dylib
          #         └── ...            # libcbor / libcrypto / libssl
          #                            # / libfuse if macFUSE was present at build time
          #
          # Run in-place: ./bin/luksbox --help, ./bin/luksbox-gui &.
          # NOT directly symlink-able into /usr/local/bin because the
          # @executable_path-relative dylib refs only resolve from the
          # bundled tree; users who want $PATH placement should keep
          # the layout intact and add an alias / wrapper script instead.
          PORTABLE="luksbox-v${LUKSBOX_VERSION}-aarch64-macos-${{ matrix.fuse_backend }}-portable"
          rm -rf portable-root
          mkdir -p "portable-root/$PORTABLE/bin" \
                   "portable-root/$PORTABLE/Frameworks"
          cp dmg-root/LUKSbox.app/Contents/MacOS/luksbox \
             dmg-root/LUKSbox.app/Contents/MacOS/luksbox-gui \
             "portable-root/$PORTABLE/bin/"
          cp -R dmg-root/LUKSbox.app/Contents/Frameworks/. \
                "portable-root/$PORTABLE/Frameworks/"
          # Required files. Fail loud if missing - same reasoning as
          # the Linux/Windows staging steps, the README-MACOS.txt
          # below references LICENSE/NOTICE/TRADEMARK.md.
          for f in README.md LICENSE NOTICE TRADEMARK.md; do
            if [ ! -f "$f" ]; then
              echo "Required file '$f' missing from repo root, commit it before tagging." >&2
              exit 1
            fi
            cp "$f" "portable-root/$PORTABLE/"
          done
          for f in SECURITY.md TUTORIAL.md; do
            [ -f "$f" ] && cp "$f" "portable-root/$PORTABLE/" || true
          done
          cat > "portable-root/$PORTABLE/README-MACOS.txt" <<'EOF'
          LUKSbox macOS portable build
          ============================

          This archive ships the LUKSbox CLI and GUI as plain binaries
          with their dynamic dependencies bundled alongside under
          Frameworks/. Use this build if you want to skip the .app /
          .dmg quarantine flow.

          Layout
          ------
              bin/luksbox        the CLI
              bin/luksbox-gui    the GUI (egui-based)
              Frameworks/        bundled libfido2 + transitive deps
                                 (libfuse-t / libfuse is NOT bundled;
                                 resolved at runtime against your
                                 installed FUSE provider)

          Running
          -------
              cd luksbox-<ver>-aarch64-macos-portable
              ./bin/luksbox --help
              ./bin/luksbox-gui &

          The binaries reference dylibs via @executable_path/../
          Frameworks/, so they MUST be invoked from within the
          extracted directory (or an equivalent layout). Moving
          bin/luksbox alone to /usr/local/bin will break dylib
          resolution at process load time.

          mount subcommand
          ----------------
          The `mount` subcommand needs a FUSE provider on the host.
          LUKSbox supports two; pick one:

            FUSE-T (recommended, kext-free):
                brew tap macos-fuse-t/homebrew-cask
                brew install --cask fuse-t

              Uses an NFS-over-loopback transport with no kernel
              extension, no Privacy & Security prompt, no Apple-
              Silicon Reduced-Security dance. Just install and go.

            macFUSE (legacy, kext-based):
                brew install --cask macfuse

              On first install macOS blocks the kext; approve it
              under System Settings -> Privacy & Security and reboot.
              Apple Silicon also needs Recovery Mode -> Startup
              Security Utility -> Reduced Security before the kext
              can load. One-time per-machine setup.

          This binary was built against whichever provider the CI
          runner detected first (FUSE-T preferred). Check which one
          with:

              ./bin/luksbox --version

          Without any FUSE provider installed, `luksbox mount` returns
          "mount target not supported on this platform".

          Quarantine
          ----------
          A .tar.gz extracted from Terminal does not propagate the
          com.apple.quarantine xattr. If you downloaded the archive
          via Safari instead and Safari attached the xattr to the
          archive itself, clear it once after extraction:

              xattr -dr com.apple.quarantine luksbox-<ver>-aarch64-macos-portable
          EOF
          tar -C portable-root -czf "${PORTABLE}.tar.gz" "$PORTABLE"
          ls -lh "${PORTABLE}.tar.gz"
          # Surface the path for the upload step.
          echo "MACOS_PORTABLE_PATH=${PORTABLE}.tar.gz" >> "$GITHUB_ENV"

      - name: Build macOS .dmg
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          # create-dmg builds a UDZO-compressed .dmg with an
          # Applications symlink; the user opens the .dmg, drags the
          # .app onto Applications, done. Standard Mac install UX.
          # If signing happened, the .app inside is signed; if not, the
          # user sees a Gatekeeper warning on first launch.
          create-dmg \
            --volname "LUKSbox v${LUKSBOX_VERSION}" \
            --volicon "crates/luksbox-gui/assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 320 \
            --icon-size 96 \
            --icon "LUKSbox.app" 150 150 \
            --hide-extension "LUKSbox.app" \
            --app-drop-link 450 150 \
            --no-internet-enable \
            "${{ matrix.archive }}" \
            "dmg-root/" || {
              # create-dmg occasionally fails on CI runners with osascript
              # AppleEvent timeouts; fall back to a plain hdiutil .dmg
              # which still gives "drag to Applications" UX, just no
              # custom background.
              echo "==> create-dmg failed, falling back to hdiutil"
              hdiutil create -volname "LUKSbox v${LUKSBOX_VERSION}" \
                -srcfolder dmg-root \
                -ov -format UDZO \
                "${{ matrix.archive }}"
            }
          ls -lh "${{ matrix.archive }}"

      - name: Code-sign macOS .dmg (only if Apple cert was imported)
        # The .dmg itself must be signed for notarytool to accept it.
        # Without this, notarisation will reject the submission with
        # "The signature does not include a secure timestamp."
        # Same gating logic as the .app codesign step above.
        if: runner.os == 'macOS' && env.MACOS_KEYCHAIN_PATH != ''
        env:
          MACOS_KEYCHAIN_PATH: ${{ env.MACOS_KEYCHAIN_PATH }}
        run: |
          set -euo pipefail
          IDENTITY=$(security find-identity -v -p codesigning "$MACOS_KEYCHAIN_PATH" \
              | awk -F '"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$IDENTITY" ]; then
              echo "::error::No 'Developer ID Application' identity found"
              exit 1
          fi
          # No --options runtime on the .dmg itself (hardened-runtime
          # only applies to executables, not container files), but the
          # --timestamp flag is mandatory for notarytool acceptance.
          codesign --force --timestamp \
              --keychain "$MACOS_KEYCHAIN_PATH" \
              --sign "$IDENTITY" \
              "${{ matrix.archive }}"
          codesign --verify --verbose=2 "${{ matrix.archive }}"

      - name: Notarize macOS .dmg (only if Apple secrets present)
        if: runner.os == 'macOS' && env.APPLE_NOTARY_USER != ''
        env:
          APPLE_NOTARY_USER:     ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_TEAM_ID:  ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          # Submit + wait for Apple's verdict (usually <5 min). On
          # success, staple the ticket so the .dmg works offline (no
          # round-trip to Apple at first launch).
          xcrun notarytool submit "${{ matrix.archive }}" \
            --apple-id "$APPLE_NOTARY_USER" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ matrix.archive }}"
          xcrun stapler validate "${{ matrix.archive }}"

      - name: Stage (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release-hardened/luksbox.exe" staging/
          Copy-Item "target/${{ matrix.target }}/release-hardened/luksbox-gui.exe" staging/

          # Bundle winfsp-x64.dll next to the .exe. The MSI handles
          # this via PATH manipulation at install time; the portable
          # .zip has no installer, so without the DLL alongside the
          # binary, the loader fails with STATUS_DLL_NOT_FOUND on
          # first launch. The Windows DLL search order checks the
          # application directory FIRST (before PATH), so a copy here
          # wins even when the user has WinFsp installed too.
          # Note: the .sys kernel driver still must be installed via
          # the WinFsp MSI for `mount` to actually work; bundling the
          # userland DLL only solves the launch-time link.
          $winfspRoot = @(
              "C:\Program Files (x86)\WinFsp",
              "C:\Program Files\WinFsp"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($winfspRoot -and (Test-Path "$winfspRoot\bin\winfsp-x64.dll")) {
              Copy-Item "$winfspRoot\bin\winfsp-x64.dll" staging/
              Write-Host "==> bundled winfsp-x64.dll from $winfspRoot\bin"

              # GPLv3-with-linking-exception requires us to ship
              # WinFsp's license text alongside the redistributed
              # DLL. WinFsp's MSI drops it under <root>\License.txt
              # (and on some versions <root>\licenses\). Try both,
              # fail loud if neither exists, since stripping the
              # license would put us out of compliance with the
              # linking-exception terms.
              $winfspLicense = @(
                  "$winfspRoot\License.txt",
                  "$winfspRoot\licenses\winfsp.txt"
              ) | Where-Object { Test-Path $_ } | Select-Object -First 1
              if ($winfspLicense) {
                  Copy-Item $winfspLicense "staging\LICENSE-WINFSP.txt"
                  Write-Host "==> bundled WinFsp license from $winfspLicense"
              } else {
                  Write-Error "winfsp-x64.dll bundled but WinFsp's license text not found under $winfspRoot; this would put the .zip out of GPLv3 compliance"
                  exit 1
              }
          } else {
              Write-Error "winfsp-x64.dll not found under WinFsp's bin dir; cannot bundle into portable .zip"
              exit 1
          }

          # Required files - the MSI hard-references them via the WiX
          # ComponentGroup, so a missing one in the repo would surface
          # as a cryptic WIX0103 several steps later. Fail loudly here
          # with a clear message instead.
          foreach ($f in @('README.md', 'LICENSE', 'NOTICE', 'TRADEMARK.md')) {
            if (-not (Test-Path $f)) {
                Write-Error "Required file '$f' is missing from repo root; commit it before tagging a release."
                exit 1
            }
            Copy-Item $f staging/
          }
          # Optional, nice-to-have docs. Silently skipped if absent.
          foreach ($f in @('SECURITY.md', 'TUTORIAL.md')) {
            if (Test-Path $f) { Copy-Item $f staging/ }
          }

          # README-PORTABLE-WINDOWS.txt: explicit note that the .zip
          # ships with winfsp-x64.dll for launch resolution but mount
          # still needs the WinFsp MSI installed (kernel driver).
          # Built as a string array (one element per line) instead of
          # a PowerShell here-string, because here-string `"@` must be
          # at column 0, which breaks YAML's `run: |` indentation.
          $readme = @(
            'LUKSbox portable Windows build',
            '==============================',
            '',
            'This .zip ships luksbox.exe + luksbox-gui.exe with',
            'winfsp-x64.dll bundled alongside. Run from the unzipped',
            'folder:',
            '',
            '    .\luksbox.exe --help',
            '    .\luksbox-gui.exe',
            '',
            'The bundled winfsp-x64.dll lets the binary launch on a',
            'machine without the WinFsp MSI installed. However, the',
            '`mount` subcommand needs the WinFsp KERNEL DRIVER, which',
            'only the official WinFsp installer provides. Install',
            'WinFsp 2.x from https://winfsp.dev/rel/ if you want to',
            'use `luksbox mount`.',
            '',
            'Every other subcommand (create, open, ls, add, mkdir,',
            'rotate, ...) works without WinFsp; the bundled DLL only',
            'needs to load.',
            '',
            'Licenses',
            '--------',
            'LUKSbox itself is licensed under the Apache License 2.0;',
            'see LICENSE in this archive.',
            '',
            'winfsp-x64.dll is a separate, third-party work bundled',
            'unmodified for runtime convenience. It is licensed under',
            'GPLv3 with a special linking exception that explicitly',
            'permits this kind of bundling alongside non-GPL software.',
            'The full WinFsp license text is in LICENSE-WINFSP.txt;',
            'source code at https://github.com/winfsp/winfsp.'
          )
          Set-Content -Path "staging\README-PORTABLE-WINDOWS.txt" -Value $readme

          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.archive }}"
          Get-Item "${{ matrix.archive }}" | Format-List

      - name: Set up MSVC dev environment (for dumpbin)
        # rustc finds link.exe via a baked-in MSVC search path so the
        # build itself doesn't need vcvars to be on PATH; dumpbin (used
        # by the next step to enumerate DLL imports) is only on PATH
        # after vcvars has been sourced. ilammy/msvc-dev-cmd runs
        # vcvars64.bat and forwards the resulting PATH/INCLUDE/LIB into
        # subsequent steps via $GITHUB_ENV.
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify Windows binary has no surprise DLL deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # FIDO2 access on Windows now goes through webauthn.dll
          # (a system DLL on every supported Windows), and WinFsp's
          # winfsp-x64.dll is the only other non-system import. There
          # are no vcpkg-statically-linked C libraries any more - that
          # path was only ever used for libfido2, which we replaced
          # with the WebAuthn API in luksbox-fido2/src/webauthn.rs.
          #
          # Blocklist below catches:
          #   1. Stragglers from a pre-webauthn build accidentally
          #      shipped (libfido2, libcbor, OpenSSL, zlib as DLL
          #      imports - should be 0 today).
          #   2. MinGW/Cygwin runtime that would mean the MSVC release
          #      job mistakenly built MinGW instead.
          # Everything else (api-ms-win-*, combase, bcrypt, kernel32,
          # winfsp-x64, webauthn, ...) is a real Windows system DLL
          # that ships with the OS, no action required from the user.
          $deny = @(
              # Stale libfido2 / vcpkg static-link targets - should
              # never appear after the webauthn.dll migration.
              'libfido2-1.dll', 'libfido2.dll',
              'libcbor.dll', 'libcbor-0.dll',
              'libcrypto-3-x64.dll', 'libcrypto-1_1-x64.dll',
              'libcrypto.dll',
              'libssl-3-x64.dll', 'libssl-1_1-x64.dll', 'libssl.dll',
              'zlib1.dll', 'zlib.dll',
              # MinGW / Cygwin runtime, would mean we shipped the
              # wrong toolchain's binary.
              'libwinpthread-1.dll', 'libgcc_s_seh-1.dll',
              'libstdc++-6.dll', 'cygwin1.dll'
          )
          # dumpbin lives next to link.exe, both are part of MSVC. The
          # ilammy/msvc-dev-cmd step above ran vcvars64.bat and pushed
          # the resulting PATH into $GITHUB_ENV, so it's resolvable here.
          $bad = $false
          foreach ($exe in @('staging\luksbox.exe', 'staging\luksbox-gui.exe')) {
              Write-Host "==> dumpbin /dependents $exe"
              $out = & dumpbin /dependents $exe 2>&1
              Write-Host ($out | Out-String)
              $deps = $out |
                  Where-Object { $_ -match '^\s+\S+\.dll' } |
                  ForEach-Object { $_.Trim() }
              foreach ($dep in $deps) {
                  $hit = $deny | Where-Object { $_ -ieq $dep }
                  if ($hit) {
                      Write-Error "==> $exe depends on blocklisted DLL: $dep"
                      $bad = $true
                  }
              }
          }
          if ($bad) {
              Write-Error "==> Surprise dynamic dep, vcpkg likely picked the wrong triplet (or a MinGW binary leaked into the MSVC release). Bundle the DLL or switch back to x64-windows-static-md."
              exit 1
          }

      - name: Smoke-test Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # If a required DLL is missing the loader returns 0xC0000135
          # (STATUS_DLL_NOT_FOUND) and the process aborts before main()
          # runs. --version exercises the full link without needing a
          # YubiKey or container, so it's a cheap canary.
          #
          # winfsp-x64.dll lives in WinFsp's bin directory which the
          # silent MSI install does NOT add to the system PATH (and
          # ilammy/msvc-dev-cmd above re-arranges PATH on top of that).
          # Prepend it for this step so the loader can resolve the
          # DLL. End users never hit this because a normal interactive
          # WinFsp install registers the DLL search path.
          $winfspBin = @(
              "C:\Program Files (x86)\WinFsp\bin",
              "C:\Program Files\WinFsp\bin"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($winfspBin) {
              Write-Host "==> prepending $winfspBin to PATH for smoke test"
              $env:PATH = "$winfspBin;$env:PATH"
          } else {
              Write-Warning "WinFsp bin directory not found, smoke test will fail with STATUS_DLL_NOT_FOUND"
          }

          & .\staging\luksbox.exe --version
          if ($LASTEXITCODE -ne 0) {
              Write-Error "==> luksbox.exe --version failed with exit $LASTEXITCODE"
              exit 1
          }

      - name: Stage upstream WinFsp license text
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Pulled verbatim from the same WinFsp tag (v2.0) that the
          # Burn bundle install-time chains. Staged into staging/ so
          # BOTH artifacts pick it up:
          #   - the bare LUKSbox.msi installs it via LuksboxFiles
          #     (LUKSbox.exe links winfsp-x64.dll at runtime regardless
          #     of how WinFsp got there, so the license is relevant in
          #     either install path);
          #   - the Burn bundle reuses the same MSI so the file lands
          #     under %ProgramFiles%\LUKSbox\LICENSE-WINFSP.txt.
          $url = "https://raw.githubusercontent.com/winfsp/winfsp/v2.0/License.txt"
          $dst = "staging\LICENSE-WINFSP.txt"
          Write-Host "==> fetching $url -> $dst"
          Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile $dst
          if (-not (Test-Path $dst) -or (Get-Item $dst).Length -lt 1000) {
              throw "WinFsp license fetch failed or returned an unexpectedly tiny file"
          }
          $bytes = (Get-Item $dst).Length
          Write-Host "==> staged $bytes bytes of WinFsp license text"

      - name: Build Windows MSI (WiX v4)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # WiX v4 ships as a .NET tool; install if it's not preinstalled.
          if (-not (Get-Command wix -ErrorAction SilentlyContinue)) {
              dotnet tool install --global wix --version 4.0.5
              $env:PATH = "$env:USERPROFILE\.dotnet\tools;" + $env:PATH
          }
          # The MSI ProgId references staging\luksbox-installer.ico for
          # the "Apps & Features" entry + Start menu shortcut. Same .ico
          # we generated for the .exe resource, just renamed for clarity.
          if (Test-Path "crates\luksbox-gui\assets\icon.ico") {
              Copy-Item "crates\luksbox-gui\assets\icon.ico" `
                        "staging\luksbox-installer.ico"
          } else {
              Write-Warning "no icon.ico, MSI will use a default Windows icon"
              # WiX errors out if the file is missing; create an empty
              # placeholder so the build doesn't break a clean checkout.
              # The real icon should always be there in CI thanks to
              # the "Generate platform icons" step.
              New-Item -ItemType File -Path "staging\luksbox-installer.ico" -Force | Out-Null
          }
          # The Burn bundle (`luksbox-bundle.wxs`) uses
          # staging\luksbox-installer-side.png for the
          # `hyperlinkSidebarLicense` theme's LogoSideFile. It's a
          # 165x315 portrait PNG with the icon centered on white,
          # generated by scripts/build_icons.sh. Without this the
          # bundle either falls back to a default WiX side image
          # (no LUKSbox branding) or, if LogoSideFile points at a
          # square asset, stretches it vertically.
          if (Test-Path "crates\luksbox-gui\assets\icon-bundle-side.png") {
              Copy-Item "crates\luksbox-gui\assets\icon-bundle-side.png" `
                        "staging\luksbox-installer-side.png"
          } else {
              Write-Warning "no icon-bundle-side.png, bundle sidebar will use default WiX image"
              New-Item -ItemType File -Path "staging\luksbox-installer-side.png" -Force | Out-Null
          }
          # MSI requires a 4-part version. The earlier "Derive
          # LUKSBOX_VERSION (Windows)" step already resolved this from
          # the tag (or Cargo.toml on dispatch builds) and exported it
          # to $env:LUKSBOX_VERSION. Use that uniformly so the MSI
          # ProductVersion always matches the .app's CFBundleVersion
          # and the .deb / .rpm metadata for the same workflow run.
          $version = $env:LUKSBOX_VERSION
          $msiName = "luksbox-v$version-x86_64-windows.msi"
          wix build dist\luksbox.wxs `
              -d "Version=$version" `
              -d "StagingDir=staging" `
              -arch x64 `
              -o $msiName
          Get-Item $msiName | Format-List
          # Surface the path so the next step (signing + upload) can
          # find it without reconstructing the name.
          echo "MSI_PATH=$msiName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Code-sign Windows artifacts (only if signing cert present)
        if: runner.os == 'Windows' && env.WINDOWS_PFX_BASE64 != ''
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64:    ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD:  ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          # Penthertz code-signing cert (Authenticode). signtool ships
          # with the Windows SDK; on windows-latest it's at:
          #   ${env:ProgramFiles(x86)}\Windows Kits\10\bin\<ver>\x64\signtool.exe
          # WHICHEVER ver is preinstalled; PATH-resolve via vswhere/where.
          $pfx = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $signtool = (Get-Command signtool -ErrorAction SilentlyContinue).Source
          if (-not $signtool) {
              $candidates = Get-ChildItem -Recurse -Filter signtool.exe `
                  "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -like '*\x64\*' } |
                  Sort-Object LastWriteTime -Descending
              $signtool = $candidates[0].FullName
          }
          foreach ($f in @('staging\luksbox.exe', 'staging\luksbox-gui.exe', $env:MSI_PATH)) {
              & $signtool sign /fd sha256 /td sha256 `
                  /tr http://timestamp.digicert.com `
                  /f $pfx /p $env:WINDOWS_PFX_PASSWORD `
                  $f
              & $signtool verify /pa /v $f
          }
          # Re-zip the .zip artifact since the .exe inside changed.
          if (Test-Path "${{ matrix.archive }}") { Remove-Item "${{ matrix.archive }}" }
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.archive }}"

      - name: Fetch + verify pinned WinFsp MSI (for the Burn bundle)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          # Pinned WinFsp version. Bump when WinFsp ships a new
          # stable; CI's mount-integration tests also reference
          # this exact version (search for "23075" in ci.yml +
          # release.yml + scripts/setup_mingw_winfsp.sh and bump
          # in lock-step). The two safety nets below catch
          # tampering:
          #   1. Authenticode signature check: WinFsp's MSI is
          #      Authenticode-signed by Bill Zissimopoulos; we
          #      reject anything not signed by that subject.
          #   2. Optional SHA-256 pin: set WINFSP_MSI_SHA256 to
          #      the known-good hash of this exact MSI to also
          #      defense-in-depth against a compromised
          #      Authenticode chain. Empty = signature check only.
          WINFSP_VERSION:      "2.0.23075"
          WINFSP_MSI_SHA256:   ""
        run: |
          $msi = "$env:RUNNER_TEMP\winfsp-bundled.msi"
          $url = "https://github.com/winfsp/winfsp/releases/download/v2.0/winfsp-$env:WINFSP_VERSION.msi"
          Write-Host "==> downloading $url"
          Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile $msi
          if (-not (Test-Path $msi)) { throw "WinFsp MSI download failed" }
          $size = (Get-Item $msi).Length
          Write-Host "==> downloaded $size bytes"

          # Defense 1: Authenticode signature check. Rejects
          # anything not signed by the WinFsp publisher.
          $sig = Get-AuthenticodeSignature -FilePath $msi
          Write-Host "==> Authenticode status: $($sig.Status) ($($sig.StatusMessage))"
          if ($sig.Status -ne 'Valid') {
              throw "WinFsp MSI Authenticode invalid: $($sig.Status) - $($sig.StatusMessage)"
          }
          $subj = $sig.SignerCertificate.Subject
          Write-Host "==> signer subject: $subj"
          # WinFsp's MSI is Authenticode-signed by Bill Zissimopoulos's
          # company NAVIMATICS LLC (Kirkland, WA) with an EV code-signing
          # cert. The other names are kept as fallback in case a future
          # WinFsp release rotates to a personal cert or a project-named
          # cert. CN-only match is fine, the cert is also EV-checked
          # implicitly via the Authenticode status above (a self-signed
          # cert with the same CN would have Status != Valid).
          if ($subj -notmatch 'NAVIMATICS|Zissimopoulos|WinFsp') {
              throw "WinFsp MSI signed by unexpected party: $subj"
          }

          # Defense 2: optional SHA-256 pin. Skipped on first
          # build (pin is empty); on subsequent builds the hash
          # is pinned and any drift fails the workflow.
          $hash = (Get-FileHash $msi -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "==> downloaded SHA-256: $hash"
          if ($env:WINFSP_MSI_SHA256) {
              $pin = $env:WINFSP_MSI_SHA256.ToLowerInvariant()
              if ($hash -ne $pin) {
                  throw "WinFsp MSI hash mismatch. expected: $pin actual: $hash"
              }
              Write-Host "==> SHA-256 pin matches."
          } else {
              Write-Warning "WINFSP_MSI_SHA256 is empty; relying on Authenticode only. Pin '$hash' in release.yml to enable defense #2."
          }

          # Surface the path so the bundle build step can find it.
          echo "WINFSP_MSI_PATH=$msi" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows Burn bundle (LUKSboxSetup.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # WiX v4 + Bal extension. The Util extension is for the
          # RegistrySearch element used by the bundle's WinFsp
          # detect-already-installed gate.
          if (-not (Get-Command wix -ErrorAction SilentlyContinue)) {
              dotnet tool install --global wix --version 4.0.5
              $env:PATH = "$env:USERPROFILE\.dotnet\tools;" + $env:PATH
          }
          wix extension add -g WixToolset.Bal.wixext/4.0.5
          wix extension add -g WixToolset.Util.wixext/4.0.5

          $version = $env:LUKSBOX_VERSION
          $bundleName = "luksbox-v$version-x86_64-windows-setup.exe"
          wix build dist\luksbox-bundle.wxs `
              -ext WixToolset.Bal.wixext `
              -ext WixToolset.Util.wixext `
              -d "Version=$version" `
              -d "StagingDir=staging" `
              -d "LuksboxMsiPath=$env:MSI_PATH" `
              -d "WinFspMsiPath=$env:WINFSP_MSI_PATH" `
              -arch x64 `
              -o $bundleName
          Get-Item $bundleName | Format-List
          echo "BUNDLE_PATH=$bundleName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Code-sign Windows bundle (only if signing cert present)
        if: runner.os == 'Windows' && env.WINDOWS_PFX_BASE64 != ''
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64:    ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD:  ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          # Burn bundles must be signed AFTER `wix build` because
          # the inner MSIs are embedded by the build (signing
          # before would corrupt the Authenticode signature; the
          # bundle's own Authenticode signature covers the whole
          # .exe including the embedded payload). Bill Z's
          # WinFsp.msi inside keeps its own Authenticode
          # signature, our outer .exe signature is what makes
          # SmartScreen happy on first download.
          $pfx = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $signtool = (Get-Command signtool -ErrorAction SilentlyContinue).Source
          if (-not $signtool) {
              $candidates = Get-ChildItem -Recurse -Filter signtool.exe `
                  "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -like '*\x64\*' } |
                  Sort-Object LastWriteTime -Descending
              $signtool = $candidates[0].FullName
          }
          # `insignia` is WiX's bundle-aware signing helper. It
          # rebuilds the bundle's Authenticode signature so the
          # embedded MSIs and the outer bundle agree on what was
          # signed, which signtool alone cannot do for a Burn
          # bundle.
          & insignia -ib $env:BUNDLE_PATH -o "$env:RUNNER_TEMP\bundle-engine.exe"
          & $signtool sign /fd sha256 /td sha256 `
              /tr http://timestamp.digicert.com `
              /f $pfx /p $env:WINDOWS_PFX_PASSWORD `
              "$env:RUNNER_TEMP\bundle-engine.exe"
          & insignia -ab "$env:RUNNER_TEMP\bundle-engine.exe" $env:BUNDLE_PATH -o $env:BUNDLE_PATH
          & $signtool sign /fd sha256 /td sha256 `
              /tr http://timestamp.digicert.com `
              /f $pfx /p $env:WINDOWS_PFX_PASSWORD `
              $env:BUNDLE_PATH
          & $signtool verify /pa /v $env:BUNDLE_PATH

      - name: Upload Windows MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          # Distinct artifact name so it doesn't collide with the .zip
          # uploaded under matrix.target below. The release job's
          # download-artifact has merge-multiple: true so both end up
          # in artifacts/.
          name: ${{ matrix.target }}-msi
          path: ${{ env.MSI_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows Burn bundle
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          # Separate artifact so the release job can list both
          # .msi (admin path) and -setup.exe (default user path).
          name: ${{ matrix.target }}-setup
          path: ${{ env.BUNDLE_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS portable tarball
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          # Distinct artifact name so it doesn't collide with the .dmg
          # uploaded under matrix.target below. The release job's
          # download-artifact has merge-multiple: true so both end up
          # in artifacts/.
          name: ${{ matrix.target }}-portable
          path: ${{ env.MACOS_PORTABLE_PATH }}
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Compute SHA-256 checksums
        run: |
          cd artifacts
          # Single-file `SHA256SUMS.txt` is what `sha256sum -c` expects
          # downstream, and gets attached to the release as an asset
          # alongside the binaries (via `files: artifacts/*` in the
          # next step).
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
          # Also emit a Markdown-formatted table of (artifact, sha256)
          # for inclusion in the release notes body. Users who don't
          # want to download SHA256SUMS.txt can verify by eyeball
          # against this table on the release page.
          {
            echo "| File | SHA-256 |"
            echo "|---|---|"
            while read -r sum file; do
              echo "| \`${file}\` | \`${sum}\` |"
            done < SHA256SUMS.txt
          } > sha256_table.md
          # Persist the table to the env so the body template below
          # can pick it up via `${{ env.SHA256_TABLE_MD }}`. Multiline
          # values use the `<<EOF` heredoc syntax that GITHUB_ENV
          # supports.
          {
            echo 'SHA256_TABLE_MD<<__EOF__'
            cat sha256_table.md
            echo '__EOF__'
          } >> "$GITHUB_ENV"

      - name: Generate Sigstore artifact attestations
        # Signs every release artifact with a short-lived GitHub-issued
        # certificate keyed to this workflow run, then registers the
        # signature on the public Sigstore transparency log. End users
        # verify with:
        #     gh attestation verify <file> --owner penthertz
        # This proves the artifact was produced by this exact workflow
        # run on this exact commit SHA, not silently swapped after the
        # fact by someone with repo write access. Zero key management
        # on our side, the OIDC identity is ephemeral.
        # We attest both the binary artifacts and SHA256SUMS.txt so a
        # user who only downloads the manifest still has a signed
        # provenance chain.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'artifacts/*'

      - name: Create GitHub Release
        # ONLY for tag pushes matching `v*`. workflow_dispatch can run
        # the same matrix to test build hygiene, but it must NOT
        # publish a public release: the artifacts produced from a
        # branch-named workflow_dispatch (e.g. on a branch called
        # `fuse-t`) have broken internal version metadata
        # (CFBundleShortVersionString = the branch name) and would
        # confuse end users. Workflow-run artifacts (via
        # actions/upload-artifact, the small "Artifacts" panel on the
        # run page) are still produced for testing and ARE downloadable
        # by maintainers from the run page.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          # Treat -rc / -beta / -alpha tags as prereleases automatically.
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## Verify your download

            ### Cryptographic provenance (GitHub / Sigstore attestation)

            Every artifact below is signed via [GitHub Artifact
            Attestations](https://docs.github.com/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds),
            which uses Sigstore under the hood. The signature proves
            the artifact was produced by this exact workflow run on
            this exact commit SHA, no human had a chance to swap it
            after the fact.

            Verify with the GitHub CLI (one-liner):

            ```bash
            # Install gh once if you don't have it:
            #   sudo apt install gh   |   sudo dnf install gh   |   brew install gh
            gh attestation verify <downloaded-file> --owner penthertz
            # Prints "Loaded digest ..." then "PASS" with the
            # workflow run + commit SHA the artifact came from.
            ```

            ### Offline check (no `gh` needed)

            Every artifact also has a SHA-256 in `SHA256SUMS.txt`
            (attached to this release):

            ```bash
            # Linux / macOS:
            sha256sum -c SHA256SUMS.txt   # Linux
            shasum -a 256 -c SHA256SUMS.txt   # macOS
            ```

            ```powershell
            # Windows (PowerShell):
            Get-FileHash luksbox-*.msi -Algorithm SHA256
            # then compare to the `*.msi` row in SHA256SUMS.txt
            ```

            ### Trust chain summary

            Artifacts on this release page are uploaded only by the
            GitHub Actions release workflow that ran on this tagged
            commit (`.github/workflows/release.yml` in the repo).
            The commit itself is GPG-signed by the maintainer, the
            upload uses GitHub's OIDC release token, and the
            Sigstore attestation above pins the signature to that
            workflow run. GPG-signed release tarballs
            (`SHA256SUMS.txt.asc`) and full SLSA L3 provenance are
            on the roadmap.

            For at-a-glance SHA-256 checking against the published
            values:

            ${{ env.SHA256_TABLE_MD }}

            ## Install

            **Linux (Ubuntu 22.04, Debian 11/12, Mint 21.x, .deb):**
              download `luksbox_*_jammy_amd64.deb` (or `_arm64`) and
              install with `sudo apt install ./luksbox_*_jammy_amd64.deb`.
              Pulls in `libfido2-1`, `libfuse3-3`, and `libtss2-*`
              automatically. Registers a `luksbox-gui` desktop
              launcher and a MIME type for `.lbx` files.

            **Linux (Ubuntu 24.04+, Debian 13+ trixie, .deb):**
              download `luksbox_*_noble_amd64.deb` (or `_arm64`) and
              install with `sudo apt install ./luksbox_*_noble_amd64.deb`.
              Same package layout as the jammy build, but with
              t64-transitioned dependency names (`libssl3t64`,
              `libfido2-1t64`, `libtss2-mu-4.0.1-0t64`, etc.). The
              jammy and noble .deb files cannot be installed
              interchangeably, the dependency names differ.

            **Linux (Fedora / RHEL / Rocky / Alma, .rpm):** download
              `luksbox-*.x86_64.rpm` (or `aarch64.rpm`) and install
              with `sudo dnf install ./luksbox-*.x86_64.rpm` (or
              `sudo rpm -i`). One .rpm covers every rpm-based
              distro, RPM uses SONAMEs for shared-library
              dependencies which are stable across releases.
              Pulls in `libfido2` and `fuse3-libs` automatically.

            **Linux (x86_64, generic tarball):** `tar xzf luksbox-${{ github.ref_name }}-x86_64-linux-jammy.tar.gz && cd luksbox-${{ github.ref_name }}-x86_64-linux-jammy && ./install.sh`
              For Arch / NixOS / Alpine / any non-deb non-rpm distro.
              The jammy variant has the broadest glibc compatibility;
              if you are on a very recent distro and prefer the noble
              build, swap `-jammy` for `-noble` in the filename.
              Installs to `~/.local/bin` and registers a desktop launcher.
              Use `./install.sh --system` for system-wide install, or
              `./install.sh --uninstall` to remove. Requires
              `libfido2-1` (and `libfuse3-3` for `mount`):
              `sudo apt install libfido2-1 libfuse3-3` (Debian/Ubuntu)
              or `sudo dnf install libfido2 fuse3-libs` (Fedora/RHEL).

            **Linux (aarch64):** `tar xzf luksbox-${{ github.ref_name }}-aarch64-linux-jammy.tar.gz && cd luksbox-${{ github.ref_name }}-aarch64-linux-jammy && ./install.sh`
              Same runtime deps and installer as x86_64. Built natively
              on a GitHub ARM64 runner, no QEMU emulation. Same
              jammy/noble distinction applies as for the .deb above.

            **macOS (Apple Silicon):** two .dmg variants, one per
              FUSE backend. Pick one based on which FUSE provider you
              want to install. Both .dmgs are otherwise identical
              (same crypto, same on-disk format, same UI); the
              difference is what `luksbox mount` calls under the hood
              and whether you need a kernel extension.

              **FUSE-T variant (recommended for personal laptops):**

                  download: luksbox-${{ github.ref_name }}-aarch64-macos-fuset.dmg
                  install FUSE-T first:
                      brew tap macos-fuse-t/homebrew-cask
                      brew install --cask fuse-t
                  then drag LUKSbox.app onto Applications.

              No kernel extension, no Privacy & Security prompt, no
              Apple-Silicon Reduced-Security dance. The .app launches
              cleanly even if FUSE-T isn't installed yet (you just
              can't use `mount` until you install it). Uses an NFS-
              over-loopback transport with **NO authentication on the
              loopback port** - on a multi-user Mac, any other local
              process can connect to the mount via NFSv4 and bypass
              LUKSbox's permission model. Documented in
              [`docs/MACOS_FUSE_T.md`](https://github.com/penthertz/LUKSbox/blob/${{ github.ref_name }}/docs/MACOS_FUSE_T.md).
              Fine for the common single-user-laptop case.

              **macFUSE variant (recommended for shared machines or
              audit-required deployments):**

                  download: luksbox-${{ github.ref_name }}-aarch64-macos-macfuse.dmg
                  install macFUSE FIRST (REQUIRED, see warning below):
                      brew install --cask macfuse
                      # then approve the kext under System Settings
                      # -> Privacy & Security and reboot. On Apple
                      # Silicon also: Recovery Mode -> Startup Security
                      # Utility -> Reduced Security.
                  then drag LUKSbox.app onto Applications.

              IMPORTANT: this variant transitively links macFUSE's
              MFMount.framework. If macFUSE is NOT installed when you
              try to launch LUKSbox.app, **macOS kills the process
              before it can show any UI** (dyld: Library not loaded
              error). Install macFUSE first, then the LUKSbox.app.
              Uses macFUSE's `/dev/macfuse*` device-node permissions
              for the kernel<->FS channel, which restricts access to
              the mounting UID - the better local-attacker model.

              **Verify which backend a given .app uses:**

                  /Applications/LUKSbox.app/Contents/MacOS/luksbox --version
                  # luksbox X.Y.Z
                  # FUSE backend: fuse-t (...)   <- FUSE-T variant
                  # FUSE backend: macfuse (...)  <- macFUSE variant

              **macOS (Apple Silicon), portable .tar.gz:** also two
              variants, `-fuset-portable.tar.gz` and `-macfuse-portable.tar.gz`,
              same backend split as the .dmgs. Ships the bare CLI +
              GUI binaries (`bin/luksbox`, `bin/luksbox-gui`) with
              their dylib closure under `Frameworks/`. Run in place:
              `./bin/luksbox --help` or `./bin/luksbox-gui &`. No
              `.app`, no Gatekeeper warning, no quarantine xattr to
              clear (when extracted via Terminal). See
              `README-MACOS.txt` inside for the full layout + caveats.

              **First launch:** the .dmg is **codesigned with the
              Penthertz Apple Developer ID Application certificate
              (team `456J2U7HQL`) and Apple-notarised**, with the
              notarisation ticket stapled to the bundle. macOS shows
              the standard "downloaded from internet, are you sure?"
              prompt that every Mac shows for any downloaded app -
              click Open and you're set. Subsequent launches are
              silent. No Gatekeeper override and no
              `xattr -dr com.apple.quarantine` workaround needed.

              Verify the signature and notarisation locally:

              ```
              # Signature: identity + chain trust
              codesign --verify --deep --strict --verbose=2 \
                  /Applications/LUKSbox.app

              # Notarisation: ticket present + valid
              spctl --assess --type execute --verbose \
                  /Applications/LUKSbox.app
              # expects: "accepted, source=Notarized Developer ID"
              ```

              You can additionally verify the .dmg SHA-256 against
              the table at the top of these release notes for an
              independent integrity check that doesn't depend on
              Apple's PKI.

            **macOS (Intel):** not shipped, build from source with
              `cargo build --profile release-hardened` on an Intel Mac
              with `brew install libfido2` (the `release-hardened`
              profile matches the hardening flags used for the shipped
              Apple-Silicon binary). The CI matrix entry for
              `x86_64-apple-darwin` is commented out in
              `.github/workflows/release.yml`, GitHub's `macos-13`
              runner has been intermittently blocking releases.

            **Windows (x86_64), recommended:** download
              `luksbox-${{ github.ref_name }}-x86_64-windows-setup.exe`,
              double-click. The bootstrapper installs WinFsp 2.0.23075
              (if not already present) AND LUKSbox in one wizard.
              Unattended deploy: `LUKSboxSetup.exe /quiet`. To skip
              WinFsp (e.g., you manage it via Group Policy):
              `LUKSboxSetup.exe InstallWinFsp=0`. WinFsp is bundled
              under its non-GPL-app linking exception; full license
              ships as `LICENSE-WINFSP.txt` in the install dir.

            **Windows (x86_64), IT-admin / bare MSI:** download
              `luksbox-${{ github.ref_name }}-x86_64-windows.msi`. This
              MSI does **not** include WinFsp; install WinFsp 2.x
              separately from <https://winfsp.dev/rel/> first
              (LUKSbox statically links `winfsp-x64.dll` and the MSI
              refuses to install without it). For unattended deploy
              behind Group Policy / SCCM / Intune where WinFsp is
              managed as a separate dependency, this is the right
              artifact. Otherwise the `-setup.exe` above is easier.

            **Windows (x86_64), portable:** unzip
              `luksbox-${{ github.ref_name }}-x86_64-windows.zip`
              and run the .exe in place. No installation, no Start
              menu entry, no PATH change. Same binaries as the MSI.
              Because nothing was added to PATH, you must either
              (a) run from a shell where `<WinFspInstall>\bin` is on
              PATH, or (b) drop a copy of `winfsp-x64.dll` next to
              `luksbox.exe` in the unzipped folder.

              libfido2 is statically linked into the .exe; no runtime
              install needed for FIDO2.

            See the **Verify your download** section at the top for
            checksum verification commands.
